name: Build and Deploy Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: demo-production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.registry.outputs.owner_lc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js (verify Angular build before Docker)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: erp-system-frontend/package-lock.json

      - name: Install & production-build frontend (fail fast with full logs)
        working-directory: erp-system-frontend
        env:
          NG_API_BASE_URL: ${{ secrets.NG_API_BASE_URL != '' && secrets.NG_API_BASE_URL || 'http://127.0.0.1:8091/api/v1' }}
        run: |
          npm ci
          npm run build:production

      - name: Registry owner (lowercase for GHCR)
        id: registry
        run: |
          OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"
          echo "Using GHCR namespace: ghcr.io/$OWNER_LC"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.registry.outputs.owner_lc }}/erp-backend
          tags: |
            type=sha,format=long
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=erp-backend
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./erp-system-backend
          file: ./erp-system-backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Docker metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.registry.outputs.owner_lc }}/erp-system-dubai
          tags: |
            type=sha,format=long
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=erp-system-dubai
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./erp-system-frontend
          file: ./erp-system-frontend/Dockerfile
          # Reuse Angular output from the runner (previous step); no second ng build inside buildx.
          target: runtime-ci
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend-nginx
          cache-to: type=gha,mode=max,scope=frontend-nginx

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Registry owner (lowercase)
        id: registry
        run: |
          OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: docker-compose.prod.yml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -euo pipefail
            OWNER_LC='${{ steps.registry.outputs.owner_lc }}'
            export BACKEND_IMAGE="ghcr.io/${OWNER_LC}/erp-backend:latest"
            export FRONTEND_IMAGE="ghcr.io/${OWNER_LC}/erp-system-dubai:latest"
            export POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
            export POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}"

            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            test -f docker-compose.prod.yml

            echo "Deploying BACKEND_IMAGE=${BACKEND_IMAGE}"
            echo "Deploying FRONTEND_IMAGE=${FRONTEND_IMAGE}"

            docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" -p "${{ secrets.GHCR_TOKEN }}"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml ps
            docker image prune -f
