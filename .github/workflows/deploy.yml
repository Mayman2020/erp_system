name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erp-system-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: erp-system-backend/pom.xml

      - name: Build and test
        run: |
          chmod +x mvnw
          ./mvnw -B verify

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erp-system-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: erp-system-frontend/package-lock.json

      - run: npm ci

      - name: Production build
        env:
          CI: "true"
          NG_API_BASE_URL: ${{ secrets.NG_API_BASE_URL || 'http://localhost:8080/api/v1' }}
        run: npm run build

  container-images:
    name: Docker build and push (GHCR)
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image names (Docker requires lowercase)
        id: img
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          repo_lc=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/${owner_lc}/${repo_lc}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${owner_lc}/${repo_lc}-frontend" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./erp-system-backend
          push: true
          tags: |
            ${{ steps.img.outputs.backend }}:latest
            ${{ steps.img.outputs.backend }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./erp-system-frontend
          push: true
          build-args: |
            NG_API_BASE_URL=${{ secrets.NG_API_BASE_URL || 'http://localhost:8080/api/v1' }}
          tags: |
            ${{ steps.img.outputs.frontend }}:latest
            ${{ steps.img.outputs.frontend }}:${{ github.sha }}

  deploy-railway-hook:
    name: Optional Railway deploy hook
    needs: [container-images]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: POST Railway deploy webhook
        env:
          RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${RAILWAY_DEPLOY_HOOK_URL:-}" ]; then
            echo "RAILWAY_DEPLOY_HOOK_URL not set — skipping (GitHub→Railway auto-deploy may still run)."
            exit 0
          fi
          curl -fsSL -X POST "$RAILWAY_DEPLOY_HOOK_URL"

  deploy-aws-ec2:
    name: Optional AWS EC2 deploy (SSH)
    needs: [container-images]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && vars.AWS_EC2_DEPLOY_ENABLED == 'true'
    steps:
      - name: Compute backend image (lowercase)
        id: img
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          repo_lc=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/${owner_lc}/${repo_lc}-backend:latest" >> "$GITHUB_OUTPUT"

      - name: Pull and run backend on EC2
        uses: appleboy/ssh-action@v1.2.2
        env:
          BACKEND_IMAGE: ${{ steps.img.outputs.backend }}
          SPRING_DATASOURCE_URL: ${{ secrets.AWS_SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.AWS_SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.AWS_SPRING_DATASOURCE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          envs: BACKEND_IMAGE,SPRING_DATASOURCE_URL,SPRING_DATASOURCE_USERNAME,SPRING_DATASOURCE_PASSWORD,JWT_SECRET,GHCR_PULL_TOKEN,GHCR_USERNAME
          script_stop: true
          script: |
            set -euo pipefail
            if [ -n "${GHCR_PULL_TOKEN:-}" ] && [ -n "${GHCR_USERNAME:-}" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            docker pull "$BACKEND_IMAGE"
            docker stop erp-backend 2>/dev/null || true
            docker rm erp-backend 2>/dev/null || true
            docker run -d --name erp-backend --restart unless-stopped -p 8080:8080 \
              -e PORT=8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e SPRING_DATASOURCE_URL="$SPRING_DATASOURCE_URL" \
              -e SPRING_DATASOURCE_USERNAME="$SPRING_DATASOURCE_USERNAME" \
              -e SPRING_DATASOURCE_PASSWORD="$SPRING_DATASOURCE_PASSWORD" \
              -e JWT_SECRET="$JWT_SECRET" \
              "$BACKEND_IMAGE"
