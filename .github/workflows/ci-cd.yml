# Production path: GitHub Actions → GHCR → VPS (docker compose).
# Required repo Secrets / Variables (Settings → Secrets and variables → Actions):
#   Build: NG_API_BASE_URL — public API root baked into the Angular build (use a **variable** or **secret**)
#   Deploy: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH (e.g. /opt/erp),
#           GHCR_USERNAME, GHCR_TOKEN (PAT with read:packages for private images),
#           POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD, JWT_SECRET, CORS_ALLOWED_ORIGINS
# Optional: DEPLOY_PORT (default 22)
# Optional public checks from the runner (set any you can reach from GitHub):
#   DEPLOY_PUBLIC_FRONTEND_URL — e.g. https://your-domain/ (port 80 or reverse-proxy)
#   DEPLOY_PUBLIC_HEALTH_URL — full URL returning OK, e.g. https://your-domain:8091/api/v1/health

name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Build and push images only (no SSH deploy)"
        required: false
        default: false
        type: boolean

# Finish in-flight deploy before starting another (avoid torn deploys).
concurrency:
  group: erp-production-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  # PRs: prove Dockerfiles build; no registry push (saves quota and avoids bad tags).
  docker-build-verify:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve NG_API_BASE_URL for PR build
        id: ng_api
        env:
          FROM_SECRET: ${{ secrets.NG_API_BASE_URL }}
          FROM_VAR: ${{ vars.NG_API_BASE_URL }}
        run: |
          URL="${FROM_SECRET:-}"
          [ -z "$URL" ] && URL="${FROM_VAR:-}"
          [ -z "$URL" ] && URL='http://127.0.0.1:8091/api/v1'
          echo "api_url<<GHA_NG_API_URL" >> "$GITHUB_OUTPUT"
          echo "$URL" >> "$GITHUB_OUTPUT"
          echo "GHA_NG_API_URL" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./erp-system-backend
          file: ./erp-system-backend/Dockerfile
          push: false
          cache-from: type=gha,scope=backend-pr
          cache-to: type=gha,mode=max,scope=backend-pr

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./erp-system-frontend
          file: ./erp-system-frontend/Dockerfile
          push: false
          build-args: |
            NG_API_BASE_URL=${{ steps.ng_api.outputs.api_url }}
          cache-from: type=gha,scope=frontend-pr
          cache-to: type=gha,mode=max,scope=frontend-pr

  build-and-push:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.registry.outputs.owner_lc }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve NG_API_BASE_URL for production images
        id: ng_api
        env:
          FROM_SECRET: ${{ secrets.NG_API_BASE_URL }}
          FROM_VAR: ${{ vars.NG_API_BASE_URL }}
        run: |
          URL="${FROM_SECRET:-}"
          [ -z "$URL" ] && URL="${FROM_VAR:-}"
          if [ -z "$URL" ]; then
            echo "::error::NG_API_BASE_URL is not set. Add it under Settings → Secrets and variables → Actions:"
            echo "::error::  • **Variables** → New repository variable NG_API_BASE_URL (preferred for a public URL), or"
            echo "::error::  • **Secrets** → New repository secret NG_API_BASE_URL"
            echo "::error::Example value: https://your-domain:8091/api/v1"
            exit 1
          fi
          echo "api_url<<GHA_NG_API_URL" >> "$GITHUB_OUTPUT"
          echo "$URL" >> "$GITHUB_OUTPUT"
          echo "GHA_NG_API_URL" >> "$GITHUB_OUTPUT"

      - name: Registry owner (lowercase for GHCR)
        id: registry
        run: |
          OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"
          echo "GHCR namespace: ghcr.io/$OWNER_LC"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.registry.outputs.owner_lc }}/erp-backend
          tags: |
            type=sha,format=long
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=erp-backend
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./erp-system-backend
          file: ./erp-system-backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Docker metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.registry.outputs.owner_lc }}/erp-system-dubai
          tags: |
            type=sha,format=long
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=erp-system-dubai
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./erp-system-frontend
          file: ./erp-system-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          build-args: |
            NG_API_BASE_URL=${{ steps.ng_api.outputs.api_url }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    if: |
      needs.build-and-push.result == 'success' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.skip_deploy != true))
    needs:
      - build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy configuration
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        run: |
          missing=0
          req() {
            name=$1
            val=$2
            if [ -z "$val" ]; then
              echo "::error::Required secret $name is not set."
              missing=1
            fi
          }
          req DEPLOY_HOST "$DEPLOY_HOST"
          req DEPLOY_USER "$DEPLOY_USER"
          req DEPLOY_SSH_KEY "$DEPLOY_SSH_KEY"
          req DEPLOY_PATH "$DEPLOY_PATH"
          req GHCR_USERNAME "$GHCR_USERNAME"
          req GHCR_TOKEN "$GHCR_TOKEN"
          req POSTGRES_DB "$POSTGRES_DB"
          req POSTGRES_USER "$POSTGRES_USER"
          req POSTGRES_PASSWORD "$POSTGRES_PASSWORD"
          req JWT_SECRET "$JWT_SECRET"
          req CORS_ALLOWED_ORIGINS "$CORS_ALLOWED_ORIGINS"
          if [ "$missing" -ne 0 ]; then
            echo "::error::Configure the secrets listed above under Repository secrets, then re-run the workflow."
            exit 1
          fi

      - name: Registry owner (lowercase)
        id: registry
        run: |
          OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"

      - name: Ensure deploy directory on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          script: |
            set -euo pipefail
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            ls -la "${{ secrets.DEPLOY_PATH }}"

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          source: docker-compose.prod.yml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy stack and verify health on server
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            OWNER_LC='${{ steps.registry.outputs.owner_lc }}'
            export BACKEND_IMAGE="ghcr.io/${OWNER_LC}/erp-backend:latest"
            export FRONTEND_IMAGE="ghcr.io/${OWNER_LC}/erp-system-dubai:latest"
            export POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
            export POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}"

            cd "${{ secrets.DEPLOY_PATH }}"
            test -f docker-compose.prod.yml

            if ! docker info >/dev/null 2>&1; then
              echo "::error::Docker is not reachable for this SSH user. Add the user to the docker group or run as root."
              exit 1
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "::error::Docker Compose v2 plugin is not installed."
              exit 1
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml ps

            echo "Waiting for backend /api/v1/health on host port 8091 ..."
            for i in $(seq 1 45); do
              if wget -q -O- http://127.0.0.1:8091/api/v1/health 2>/dev/null | grep -q OK; then
                echo "Backend health OK"
                break
              fi
              if [ "$i" -eq 45 ]; then
                echo "::error::Backend did not become healthy on port 8091"
                docker compose -f docker-compose.prod.yml logs --tail=120 backend || true
                exit 1
              fi
              sleep 3
            done

            echo "Checking frontend HTTP on host port 80 ..."
            for i in $(seq 1 20); do
              if wget -q -O- http://127.0.0.1/ >/dev/null 2>&1; then
                echo "Frontend responded on port 80"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "::error::Frontend did not respond on port 80"
                docker compose -f docker-compose.prod.yml logs --tail=80 frontend || true
                exit 1
              fi
              sleep 2
            done

            docker image prune -f

      - name: Verify public endpoints (optional)
        env:
          DEPLOY_PUBLIC_FRONTEND_URL: ${{ secrets.DEPLOY_PUBLIC_FRONTEND_URL }}
          DEPLOY_PUBLIC_HEALTH_URL: ${{ secrets.DEPLOY_PUBLIC_HEALTH_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_PUBLIC_FRONTEND_URL:-}" ] && [ -z "${DEPLOY_PUBLIC_HEALTH_URL:-}" ]; then
            echo "Optional: set DEPLOY_PUBLIC_FRONTEND_URL and/or DEPLOY_PUBLIC_HEALTH_URL to probe from GitHub runners."
            exit 0
          fi
          if [ -n "${DEPLOY_PUBLIC_FRONTEND_URL:-}" ]; then
            curl -fsS --max-time 45 -o /dev/null "$DEPLOY_PUBLIC_FRONTEND_URL"
            echo "Public frontend URL OK"
          fi
          if [ -n "${DEPLOY_PUBLIC_HEALTH_URL:-}" ]; then
            curl -fsS --max-time 45 "$DEPLOY_PUBLIC_HEALTH_URL" | grep -q OK
            echo "Public health URL OK"
          fi
