# Full stack: build images locally + run (Portainer or `docker compose up --build`).
# Run from repo root: `docker compose -f ops/docker/docker-compose.yml up --build`
# Or from this directory: `docker compose up --build`
# VPS UI: http://<host>:10081  — API: http://<host>:10080/api/v1
# Env: copy ops/environment/.env.example → ops/environment/.env (or repo-root .env)

name: erp

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-erp_db}
    volumes:
      - erp_pgdata:/var/lib/postgresql/data
    networks:
      - erp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  backend:
    build:
      context: ../../erp-system-backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "10080:8080"
    networks:
      - erp-network
    environment:
      PORT: "8080"
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-erp_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      CORS_ALLOW_ALL: ${CORS_ALLOW_ALL:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://93.127.141.227:10026,http://93.127.141.227:10081}
    restart: unless-stopped

  frontend:
    build:
      context: ../../erp-system-frontend
      dockerfile: Dockerfile
      args:
        NG_API_BASE_URL: ${NG_API_BASE_URL:-http://93.127.141.227:10080/api/v1}
    depends_on:
      - backend
    ports:
      - "10081:80"
    networks:
      - erp-network
    restart: unless-stopped

networks:
  erp-network:
    driver: bridge

volumes:
  erp_pgdata:
