# Optional all-in-one reverse proxy (single host/port): Angular static + proxy /api/v1 → Spring Boot.
# Split Docker stack: frontend container serves UI only; browser may call API on another host:port.
# Set `root` to your built UI path, e.g. .../dist/erp-system-frontend/browser

server {
    listen 80;
    server_name _;

    root /var/www/erp/browser;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    location /api/v1/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8080;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
