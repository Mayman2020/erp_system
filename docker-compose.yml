# Local / demo: build and run full stack (no pre-pushed images required).
# Usage: docker compose up --build
#
# UI:  http://localhost:${FRONTEND_HTTP_PORT:-8080}
# API: http://localhost:8091/api/v1

name: erp

services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_local_dev_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./erp-system-backend
      dockerfile: Dockerfile
    container_name: erp-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-postgres}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-erp_local_dev_change_me}
      JWT_SECRET: ${JWT_SECRET:-erp-system-super-secret-key-change-me-2026}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:*,http://127.0.0.1,http://127.0.0.1:*}
    ports:
      - "8091:8080"

  frontend:
    build:
      context: ./erp-system-frontend
      dockerfile: Dockerfile
      args:
        NG_API_BASE_URL: ${NG_API_BASE_URL:-http://127.0.0.1:8091/api/v1}
    container_name: erp-system-dubai
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_HTTP_PORT:-8080}:80"

volumes:
  postgres_data:
