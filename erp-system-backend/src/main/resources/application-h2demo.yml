# No PostgreSQL: start app for smoke tests (no Flyway; in-memory schema from Hibernate)
# Usage: SPRING_PROFILES_ACTIVE=h2demo
spring:
  config:
    activate:
      on-profile: h2demo
  datasource:
    url: jdbc:h2:mem:erpdemo;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
    hikari:
      maximum-pool-size: 4
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: false
