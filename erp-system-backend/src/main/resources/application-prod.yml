spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL:${SPRING_DATASOURCE_URL}}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      auto-commit: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: erp_system
  flyway:
    enabled: true
    baseline-on-migrate: true
    create-schemas: true
    repair-on-migrate: true
    schemas: erp_system
    locations: classpath:db/migration
    out-of-order: false

logging:
  level:
    root: INFO
    com.erp.system: INFO
    org.springframework.boot: INFO
    org.hibernate: WARN
    org.flywaydb: INFO
