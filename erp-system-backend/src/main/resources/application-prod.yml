# Railway / production:
# - Listen on all interfaces so PLATFORM PORT health probes can reach the app.
# - Datasource: SPRING_DATASOURCE_* first; then DB_* / PG* / jdbc template (Railway bootstrap may set system properties).
server:
  address: 0.0.0.0
  port: ${PORT:8080}
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    # 12-factor: SPRING_DATASOURCE_* ; Railway often uses DB_URL / PG* (see application-prod header).
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:${PGUSER:}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASS:${PGPASSWORD:}}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      # Allow slow DB/network during container start (then fail instead of immediate crash loop).
      initialization-fail-timeout: 120000
      validation-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: erp_system
  flyway:
    enabled: true
    baseline-on-migrate: true
    create-schemas: true
    repair-on-migrate: true
    schemas: erp_system
    locations: classpath:db/migration
