# Production / Docker / VPS:
# - Listen on all interfaces (required in containers).
# - Datasource: set SPRING_DATASOURCE_* (no secrets in repo — use env / secrets).
# - Defaults match typical Compose service name `postgres` and DB name `erp_db` (override via env).
server:
  address: 0.0.0.0
  port: ${PORT:8080}
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/erp_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      # Allow slow DB/network during container start (then fail instead of immediate crash loop).
      initialization-fail-timeout: 120000
      validation-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: erp_system
  flyway:
    enabled: true
    baseline-on-migrate: true
    create-schemas: true
    repair-on-migrate: true
    schemas: erp_system
    locations: classpath:db/migration

# Require a strong JWT secret in production (set JWT_SECRET in the environment).
# CORS: default allow-all (pattern *) + credentials false — valid in browsers; JWT still sent via Authorization header.
# Set CORS_ALLOW_ALL=false and CORS_ALLOWED_ORIGINS=... for a strict allowlist.
app:
  security:
    jwt:
      secret: ${JWT_SECRET}
  cors:
    allow-all-origins: ${CORS_ALLOW_ALL:true}
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://93.127.141.227:10026,http://93.127.141.227:10081}

logging:
  level:
    root: INFO
    com.erp.system: INFO
