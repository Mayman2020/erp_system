# Railway / production:
# - Uses DATABASE_URL (Railway's pre-built connection string) as the primary datasource URL.
# - Falls back to SPRING_DATASOURCE_URL if DATABASE_URL is not set.
# - USERNAME/PASSWORD resolved from DB_USER, SPRING_DATASOURCE_USERNAME, or PGUSER.
# - Optional query suffix: PG_JDBC_EXTRA e.g. sslmode=require (use ?sslmode=require or sslmode=require)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL:${SPRING_DATASOURCE_URL}}
    username: ${DB_USER:${SPRING_DATASOURCE_USERNAME:${PGUSER:}}}
    password: ${DB_PASS:${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:}}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: erp_system
  flyway:
    enabled: true
    baseline-on-migrate: true
    create-schemas: true
    repair-on-migrate: true
    schemas: erp_system
    locations: classpath:db/migration
