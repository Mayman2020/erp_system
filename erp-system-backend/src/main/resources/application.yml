spring:
  application:
    name: erp-system-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  servlet:
    context-path: /api/v1

app:
  cors:
    # Ignored when allow-all-origins is true
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,https://*.vercel.app}
    # Demo / Vercel: allow any origin (JWT in Authorization header; credentials disabled)
    allow-all-origins: ${CORS_ALLOW_ALL:true}
  security:
    jwt:
      secret: ${JWT_SECRET:erp-system-super-secret-key-change-me-2026}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

logging:
  level:
    root: INFO
    com.erp.system: DEBUG
