spring:
  application:
    name: erp-system-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      connection-timeout: 30000
  cache:
    type: caffeine
    cache-names: lookups
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

# Actuator: full JSON at /api/v1/actuator/health (servlet context-path applies).
# Root /health and /actuator/health are also served by Tomcat (see RootHealthEngineValve) for probes.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
    min-response-size: 1024
  tomcat:
    keep-alive-timeout: 60s
    max-keep-alive-requests: 100

app:
  cors:
    # Ignored when allow-all-origins is true
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,https://*.vercel.app}
    # Demo / Vercel: allow any origin (JWT in Authorization header; credentials disabled)
    allow-all-origins: ${CORS_ALLOW_ALL:true}
  security:
    jwt:
      secret: ${JWT_SECRET:erp-system-super-secret-key-change-me-2026}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

logging:
  level:
    root: INFO
    com.erp.system: DEBUG
