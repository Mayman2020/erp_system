spring:
  application:
    name: erp-system-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:admin}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: erp_system

  flyway:
    enabled: true
    baseline-on-migrate: true
    create-schemas: true
    repair-on-migrate: true
    schemas: erp_system
    locations: classpath:db/migration

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  # Render/Fly.io/Railway set PORT; local dev uses 8091
  port: ${PORT:8091}
  forward-headers-strategy: framework
  servlet:
    context-path: /api/v1

app:
  cors:
    # Comma-separated. Patterns like https://*.vercel.app work with allowCredentials.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,https://*.vercel.app,https://*.netlify.app}
  security:
    jwt:
      secret: ${JWT_SECRET:erp-system-super-secret-key-change-me-2026}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

logging:
  level:
    root: INFO
    com.erp.system: DEBUG
