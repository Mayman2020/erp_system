# Local development: PostgreSQL on localhost (default credentials for docker-less dev)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}}
    username: ${DB_USER:${SPRING_DATASOURCE_USERNAME:postgres}}
    password: ${DB_PASS:${SPRING_DATASOURCE_PASSWORD:admin}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: erp_system
  flyway:
    enabled: true
    baseline-on-migrate: true
    create-schemas: true
    repair-on-migrate: true
    schemas: erp_system
    locations: classpath:db/migration
