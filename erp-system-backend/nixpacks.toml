# Railway Nixpacks: JDK 17 and Maven Wrapper build (no Docker).
[variables]
NIXPACKS_JDK_VERSION = "17"

[phases.build]
# Windows checkouts often lack +x on mvnw; sh avoids "Permission denied" on Linux builders.
cmds = ["chmod +x mvnw || true", "sh mvnw clean package -DskipTests -B"]

[start]
cmd = "java -jar target/*.jar"
