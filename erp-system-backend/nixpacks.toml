# Railway Nixpacks: JDK 17 + Maven (from Nixpacks setup). Use `mvn` here instead of `mvnw`
# because the Docker-based Nix build can omit `.mvn/wrapper/maven-wrapper.jar` (e.g. old
# .dockerignore, or JAR not on the remote branch), which causes MavenWrapperMain errors.
# Local/dev: keep using ./mvnw or mvnw.cmd as usual.
[variables]
NIXPACKS_JDK_VERSION = "17"

[phases.build]
cmds = ["mvn clean package -DskipTests -B"]

[start]
# Default container heap (~25% RAM) is often too small for Hibernate + many entities on small Railway plans.
cmd = "java -XX:MaxRAMPercentage=75.0 -XX:+UseContainerSupport -XX:+ExitOnOutOfMemoryError -Dfile.encoding=UTF-8 -jar target/*.jar"
