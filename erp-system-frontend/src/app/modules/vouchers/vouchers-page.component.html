<section class="erp-page erp-list-page erp-estate-fade-up">
  <app-page-header [titleKey]="titleKey">
    <div header-actions class="erp-toolbar-icons">
          <button
            type="button"
            class="erp-button"
            [ngClass]="activeVoucherType === 'payment' ? 'erp-button--primary' : 'erp-button--ghost'"
            (click)="goToVoucherKind('payment')"
          >
            <mat-icon aria-hidden="true">payments</mat-icon>
            <span>{{ 'VOUCHERS.PAYMENT.TITLE' | translate }}</span>
          </button>
          <button
            type="button"
            class="erp-button"
            [ngClass]="activeVoucherType === 'receipt' ? 'erp-button--primary' : 'erp-button--ghost'"
            (click)="goToVoucherKind('receipt')"
          >
            <mat-icon aria-hidden="true">receipt_long</mat-icon>
            <span>{{ 'VOUCHERS.RECEIPT.TITLE' | translate }}</span>
          </button>
          <button
            type="button"
            class="erp-button erp-button--primary"
            (click)="createVoucher()"
          >
            <mat-icon aria-hidden="true">add</mat-icon>
            <span>{{ 'VOUCHERS.CREATE' | translate }}</span>
          </button>
    </div>
  </app-page-header>

  <div class="erp-card erp-list-page__card">
    <div class="erp-card__body">
      <app-erp-alert *ngIf="successKey" type="success" [message]="successKey" (dismissed)="successKey = ''"></app-erp-alert>
      <app-erp-alert *ngIf="errorKey" type="danger" [message]="errorKey" (dismissed)="errorKey = ''"></app-erp-alert>
      <app-advanced-search-bar (search)="onSearch($event)" [showStatus]="true" [showDateRange]="true" [showAmountRange]="true" [statusOptions]="voucherStatuses"></app-advanced-search-bar>
      <app-data-table [columns]="columns" [data]="(rows$ | async) ?? []" [actions]="actions" [loading]="loading" (actionClick)="onTableAction($event)"></app-data-table>
    </div>
  </div>
</section>

<app-erp-dialog [visible]="dialogVisible" [titleKey]="dialogTitle" size="xl" (close)="closeDialog()">
  <div dialog-body>
    <app-erp-alert *ngIf="successKey" type="success" [message]="successKey" (dismissed)="successKey = ''"></app-erp-alert>
    <app-erp-alert *ngIf="errorKey" type="danger" [message]="errorKey" (dismissed)="errorKey = ''"></app-erp-alert>
  <form [formGroup]="form" class="row erp-dialog-form">
    <div class="col-md-6 mb-3">
      <app-form-field [control]="form.controls.voucherDate" labelKey="VOUCHERS.FORM.DATE" icon="calendar_month" type="date" [readonly]="readOnlyMode"></app-form-field>
    </div>
    <div class="col-md-6 mb-3">
      <app-form-field
        [control]="form.controls.reference"
        labelKey="VOUCHERS.FORM.NUMBER"
        hintKey="VOUCHERS.FORM.NUMBER_HINT"
        type="text"
        [readonly]="true"
      ></app-form-field>
    </div>
    <div class="col-md-6 mb-3">
      <app-form-field
        [control]="form.controls.partyName"
        [labelKey]="activeVoucherType === 'payment' ? 'VOUCHERS.FORM.BENEFICIARY' : 'VOUCHERS.FORM.PAYER'"
        icon="person"
        [readonly]="readOnlyMode"
      ></app-form-field>
    </div>
    <div class="col-md-6 mb-3">
      <app-form-field
        [control]="form.controls.paymentMethod"
        labelKey="VOUCHERS.FORM.METHOD"
        icon="payments"
        type="select"
        [options]="paymentMethods"
        optionLabelPrefix="PAYMENT_METHOD."
        [disabled]="readOnlyMode"
      ></app-form-field>
    </div>
    <div class="col-md-6 mb-3">
      <app-form-field
        [control]="form.controls.currencyCode"
        labelKey="VOUCHERS.FORM.CURRENCY"
        icon="currency_exchange"
        type="select"
        [options]="currencies"
        [disabled]="readOnlyMode"
      ></app-form-field>
    </div>
    <div class="col-md-6 mb-3">
      <app-form-field
        [control]="form.controls.voucherType"
        labelKey="VOUCHERS.FORM.VOUCHER_TYPE"
        icon="receipt"
        type="select"
        [options]="voucherTypes"
        optionLabelPrefix="VOUCHER_TYPE."
        [disabled]="readOnlyMode"
      ></app-form-field>
    </div>
    <div class="col-md-6 mb-3">
      <app-account-tree-picker
        formControlName="cashAccountId"
        [accountTree]="assetAccountTree"
        labelKey="VOUCHERS.FORM.BANK_ACCOUNT"
        icon="account_balance_wallet"
        [minSelectableLevel]="1"
        [selectableLeafOnly]="true"
      ></app-account-tree-picker>
    </div>
    <div class="col-md-6 mb-3">
      <app-account-tree-picker
        formControlName="targetAccountId"
        [accountTree]="accountTree"
        [labelKey]="activeVoucherType === 'payment' ? 'VOUCHERS.FORM.TARGET_ACCOUNT_PAYMENT' : 'VOUCHERS.FORM.TARGET_ACCOUNT_RECEIPT'"
        icon="account_tree"
        [minSelectableLevel]="1"
        [selectableLeafOnly]="true"
      ></app-account-tree-picker>
    </div>
    <div class="col-md-6 mb-3">
      <app-form-field
        [control]="form.controls.amount"
        labelKey="VOUCHERS.FORM.AMOUNT"
        icon="payments"
        type="number"
        step="0.01"
        [readonly]="readOnlyMode"
      ></app-form-field>
    </div>
    <div class="col-md-6 mb-3">
      <app-form-field
        [control]="form.controls.linkedReference"
        labelKey="VOUCHERS.FORM.REFERENCE"
        icon="link"
        [readonly]="readOnlyMode"
      ></app-form-field>
    </div>
    <div class="col-12 mb-3">
      <app-form-field
        [control]="form.controls.description"
        labelKey="VOUCHERS.FORM.DESCRIPTION"
        icon="notes"
        type="textarea"
        [rows]="3"
        [readonly]="readOnlyMode"
      ></app-form-field>
    </div>
  </form>
  </div>
  <div dialog-footer class="erp-dialog-actions">
    <button type="button" class="erp-button erp-button--primary" (click)="save()" [disabled]="readOnlyMode || saving">
      {{ 'COMMON.SAVE' | translate }}
    </button>
    <button type="button" class="erp-button erp-button--ghost" (click)="closeDialog()">
      {{ 'COMMON.CANCEL' | translate }}
    </button>
  </div>
</app-erp-dialog>
