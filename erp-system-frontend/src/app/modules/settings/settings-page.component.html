<section class="erp-page erp-list-page erp-estate-fade-up">
  <app-page-header [titleKey]="titleKey"></app-page-header>

  <div class="settings-premium-container">
    <app-loading-state *ngIf="loading && accountingLoading"></app-loading-state>

    <div *ngIf="!loading && !accountingLoading" class="settings-nav-pills">
      <button 
        type="button" 
        class="nav-pill" 
        [class.is-active]="activeTabId === 'profile'"
        (click)="activeTabId = 'profile'"
      >
        <mat-icon>person</mat-icon>
        <span>{{ 'PROFILE.PERSONAL_INFO' | translate }}</span>
      </button>
      <button 
        *ngIf="canViewAccounting"
        type="button" 
        class="nav-pill" 
        [class.is-active]="activeTabId === 'accounting'"
        (click)="activeTabId = 'accounting'"
      >
        <mat-icon>account_balance</mat-icon>
        <span>{{ 'SETTINGS.ACCOUNTING_TAB' | translate }}</span>
      </button>
      <button
        type="button"
        class="nav-pill"
        [class.is-active]="activeTabId === 'company'"
        (click)="activeTabId = 'company'"
      >
        <mat-icon>domain</mat-icon>
        <span>{{ 'SETTINGS.COMPANY_TAB' | translate }}</span>
      </button>
    </div>

    <div class="settings-content-wrapper" [ngSwitch]="activeTabId">
      <div *ngSwitchCase="'profile'" class="animate__animated animate__fadeIn">
        <app-profile-settings
          [user]="user$ | async"
          [themeMode]="themeMode"
          [currentLanguage]="currentLanguage"
          [saving]="saving"
          [errorKey]="errorKey"
          [successKey]="successKey"
          [passwordSaving]="passwordSaving"
          [passwordErrorKey]="passwordErrorKey"
          [passwordSuccessKey]="passwordSuccessKey"
          (saveProfile)="onSaveProfile($event)"
          (changeTheme)="setTheme($event)"
          (changeLanguage)="setLanguage($event)"
          (changePassword)="onChangePassword($event)"
        ></app-profile-settings>
      </div>

      <div *ngSwitchCase="'accounting'" class="animate__animated animate__fadeIn">
        <app-accounting-settings
          [settings]="accountingSettings"
          [methodOptions]="accountingMethodOptions"
          [currencyOptions]="currencyOptions"
          [loading]="accountingLoading"
          [saving]="!!accountingSavingLabel"
          [errorKey]="accountingErrorKey"
          [successKey]="accountingSuccessKey"
          (saveSettings)="onSaveAccounting($event)"
          (createYear)="onCreateYear($event)"
          (createPeriod)="onCreatePeriod($event)"
          (toggleYear)="onToggleYear($event)"
          (togglePeriod)="onTogglePeriod($event)"
        ></app-accounting-settings>
      </div>

      <div *ngSwitchCase="'company'" class="animate__animated animate__fadeIn">
        <app-company-settings
          [settings]="companySettings"
          [canEdit]="isAdmin"
          [saving]="companySaving"
          [errorKey]="companyErrorKey"
          [successKey]="companySuccessKey"
          (saveSettings)="onSaveCompany($event)"
        ></app-company-settings>
      </div>
    </div>
  </div>
</section>
