<section class="erp-page erp-list-page erp-estate-fade-up">
  <app-page-header [titleKey]="titleKey"><div header-actions class="erp-toolbar-icons"><button class="erp-button erp-button--primary" type="button" (click)="openCreate()"><mat-icon>add</mat-icon><span>{{ 'ERP.CREATE_ACTIVITY' | translate }}</span></button></div></app-page-header>
  <div class="erp-card erp-list-page__card"><div class="erp-card__body">
    <app-advanced-search-bar [showStatus]="true" [statusOptions]="statusOptions" (search)="onSearch($event)"></app-advanced-search-bar>
    <app-data-table [columns]="columns" [data]="rows" [actions]="actions" [loading]="loading" (actionClick)="onTableAction($event)"></app-data-table>
  </div></div>
</section>
<app-erp-dialog [visible]="formVisible" [titleKey]="formMode === 'create' ? 'ERP.CREATE_ACTIVITY' : 'COMMON.EDIT'" size="lg" (close)="closeForm()">
  <div dialog-body><form [formGroup]="form"><div class="row">
    <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.activityType" labelKey="ERP.ACTIVITY_TYPE" [readonly]="readOnly"></app-form-field></div>
    <div class="col-md-8 mb-3"><app-form-field [control]="form.controls.subject" labelKey="ERP.SUBJECT" [readonly]="readOnly"></app-form-field></div>
    <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.activityDate" labelKey="COMMON.DATE" type="date" [readonly]="readOnly"></app-form-field></div>
    <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.status" labelKey="COMMON.STATUS" [readonly]="readOnly"></app-form-field></div>
    <div class="col-12 mb-3"><app-form-field [control]="form.controls.notes" labelKey="INVOICES.NOTES" type="textarea" [rows]="2" [readonly]="readOnly"></app-form-field></div>
  </div></form>
  <app-erp-audit-trail
    *ngIf="formMode !== 'create' && selectedAuditRecord as audit"
    [createdAt]="audit.createdAt"
    [updatedAt]="audit.updatedAt"
    [createdBy]="audit.createdBy"
    [updatedBy]="audit.updatedBy">
  </app-erp-audit-trail>
  </div>
  <div dialog-footer class="d-flex gap-2 justify-content-end"><button type="button" class="erp-button erp-button--secondary" (click)="closeForm()">{{ 'COMMON.CLOSE' | translate }}</button><button *ngIf="!readOnly" type="button" class="erp-button erp-button--primary" [disabled]="saving" (click)="save()">{{ 'COMMON.SAVE' | translate }}</button></div>
</app-erp-dialog>
