<section class="erp-page erp-list-page erp-estate-fade-up">
  <app-page-header [titleKey]="titleKey"><div header-actions><button class="erp-button erp-button--primary" type="button" (click)="openCreate()"><mat-icon>add</mat-icon><span>{{ 'ERP.CREATE_NOTE' | translate }}</span></button></div></app-page-header>
  <div class="erp-card erp-list-page__card"><div class="erp-card__body">
    <app-advanced-search-bar (search)="onSearch($event)"></app-advanced-search-bar>
    <app-data-table [columns]="columns" [data]="rows" [actions]="actions" [loading]="loading" (actionClick)="onTableAction($event)"></app-data-table>
  </div></div>
</section>
<app-erp-dialog [visible]="formVisible" [titleKey]="formMode === 'create' ? 'ERP.CREATE_NOTE' : 'COMMON.EDIT'" size="lg" (close)="closeForm()">
  <div dialog-body><form [formGroup]="form"><div class="row">
    <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.entityType" labelKey="ERP.ENTITY_TYPE" [readonly]="readOnly"></app-form-field></div>
    <div class="col-md-4 mb-3" *ngIf="form.controls.entityType.value === 'LEAD'; else manualEntityId">
      <label class="form-label">{{ 'MENU.LEADS' | translate }}</label>
      <select class="form-control" formControlName="entityId" [disabled]="readOnly">
        <option *ngFor="let l of leadOptions" [ngValue]="l.id">{{ l.label }}</option>
      </select>
    </div>
    <ng-template #manualEntityId>
      <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.entityId" labelKey="COMMON.ID" type="number" [readonly]="readOnly"></app-form-field></div>
    </ng-template>
    <div class="col-12 mb-3"><app-form-field [control]="form.controls.content" labelKey="ERP.NOTE_CONTENT" type="textarea" [rows]="4" [readonly]="readOnly"></app-form-field></div>
  </div></form></div>
  <div dialog-footer class="d-flex gap-2 justify-content-end"><button type="button" class="erp-button erp-button--secondary" (click)="closeForm()">{{ 'COMMON.CLOSE' | translate }}</button><button *ngIf="!readOnly" type="button" class="erp-button erp-button--primary" [disabled]="saving" (click)="save()">{{ 'COMMON.SAVE' | translate }}</button></div>
</app-erp-dialog>
