<section class="erp-page erp-report-page erp-estate-fade-up">
  <app-page-header [titleKey]="titleKey"></app-page-header>

  <div class="erp-card erp-report-page__card">
    <div class="erp-card__body">
      <app-advanced-search-bar
        [showDateRange]="false"
        [showStatus]="false"
        (search)="onSearch($event)"
      ></app-advanced-search-bar>

      <app-erp-alert *ngIf="errorKey" type="danger" [message]="errorKey" extraClass="mt-3" (dismissed)="errorKey = ''"></app-erp-alert>

      <div class="erp-report-page__summary" *ngIf="!loading && !errorKey">
        <div class="erp-report-page__metric">
          <mat-icon class="erp-report-page__metric-icon">inventory_2</mat-icon>
          <div class="erp-report-page__metric-label">{{ 'ERP.TOTAL_SKUS' | translate }}</div>
          <div class="erp-report-page__metric-value" [erpCountUp]="summary.totalSkus" [erpCountUpDecimals]="0"></div>
        </div>
        <div class="erp-report-page__metric">
          <mat-icon class="erp-report-page__metric-icon">warning</mat-icon>
          <div class="erp-report-page__metric-label">{{ 'ERP.LOW_STOCK_COUNT' | translate }}</div>
          <div class="erp-report-page__metric-value" [erpCountUp]="summary.lowStockCount" [erpCountUpDecimals]="0"></div>
        </div>
        <div class="erp-report-page__metric">
          <mat-icon class="erp-report-page__metric-icon">warehouse</mat-icon>
          <div class="erp-report-page__metric-label">{{ 'ERP.TOTAL_QUANTITY' | translate }}</div>
          <div class="erp-report-page__metric-value" [erpCountUp]="summary.totalQuantity" [erpCountUpDecimals]="2"></div>
        </div>
      </div>

      <app-data-table [columns]="columns" [data]="rows" [loading]="loading"></app-data-table>
    </div>
  </div>
</section>
