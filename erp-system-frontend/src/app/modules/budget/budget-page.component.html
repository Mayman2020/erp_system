<section class="erp-page erp-list-page erp-estate-fade-up">
  <app-page-header [titleKey]="titleKey">
    <div header-actions>
      <button class="erp-button erp-button--primary" type="button" (click)="openCreate()">
        <mat-icon aria-hidden="true">add</mat-icon>
        <span>{{ 'BUDGET.CREATE' | translate }}</span>
      </button>
    </div>
  </app-page-header>
  <div class="erp-card erp-list-page__card">
    <div class="erp-card__body">
      <app-erp-alert *ngIf="errorKey" type="danger" [message]="errorKey" extraClass="mb-3" (dismissed)="errorKey = ''"></app-erp-alert>
      <app-erp-alert *ngIf="successKey" type="success" [message]="successKey" extraClass="mb-3" (dismissed)="successKey = ''"></app-erp-alert>
      <app-advanced-search-bar [showStatus]="showStatus" [statusOptions]="statusOptions" (search)="onSearch($event)"></app-advanced-search-bar>
      <app-data-table [columns]="columns" [data]="rows" [actions]="tableActions" [loading]="loading" (actionClick)="onTableAction($event)"></app-data-table>
    </div>
  </div>
</section>
<app-erp-dialog [visible]="formVisible" [titleKey]="formMode === 'create' ? 'BUDGET.CREATE' : (formMode === 'view' ? 'COMMON.VIEW' : 'COMMON.EDIT')" size="lg" (close)="closeForm()">
  <div dialog-body>
    <form [formGroup]="form" class="erp-dialog-form">
      <div class="row">
        <div class="col-md-6 mb-3"><app-form-field [control]="form.controls.budgetName" labelKey="BUDGET.NAME" icon="label" [readonly]="readOnly"></app-form-field></div>
        <div class="col-md-6 mb-3"><app-form-field [control]="form.controls.accountId" labelKey="JOURNAL.ACCOUNT_NAME" icon="account_tree" type="select" [options]="accountOptions" optionValueField="id" optionLabelField="label" [disabled]="readOnly"></app-form-field></div>
        <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.budgetYear" labelKey="BUDGET.YEAR" icon="calendar_today" type="number" [readonly]="readOnly"></app-form-field></div>
        <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.budgetMonth" labelKey="BUDGET.MONTH" icon="date_range" type="select" [options]="monthOptions" optionValueField="id" optionLabelField="label" [disabled]="readOnly"></app-form-field></div>
        <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.plannedAmount" labelKey="BUDGET.PLANNED" icon="attach_money" type="number" step="0.01" min="0" [readonly]="readOnly"></app-form-field></div>
        <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.status" labelKey="COMMON.STATUS" icon="flag" type="select" [options]="budgetStatuses" [readonly]="readOnly"></app-form-field></div>
        <div class="col-12 mb-3"><app-form-field [control]="form.controls.notes" labelKey="INVOICES.NOTES" icon="notes" type="textarea" [rows]="2" [readonly]="readOnly"></app-form-field></div>
      </div>
    </form>
  </div>
  <div dialog-footer class="d-flex gap-2 justify-content-end">
    <button type="button" class="erp-button erp-button--secondary" (click)="closeForm()">{{ 'COMMON.CLOSE' | translate }}</button>
    <button *ngIf="!readOnly" type="button" class="erp-button erp-button--primary" [disabled]="saving" (click)="save()">{{ 'COMMON.SAVE' | translate }}</button>
  </div>
</app-erp-dialog>
