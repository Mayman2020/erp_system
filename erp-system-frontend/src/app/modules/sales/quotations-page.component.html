<app-erp-document-page-shell
  [titleKey]="config.titleKey"
  [columns]="columns"
  [rows]="rows"
  [actions]="actions"
  [statusOptions]="statusOptions"
  [loading]="loading"
  [saving]="saving"
  [errorKey]="errorKey"
  [successKey]="successKey"
  [formVisible]="formVisible"
  [formMode]="formMode"
  [selectedId]="selectedId"
  [auditRecord]="selectedAuditRecord"
  [form]="form"
  [parties]="parties"
  [products]="products"
  numberField="quotationNumber"
  dateField="quotationDate"
  partyField="customerId"
  numberLabelKey="ERP.NUMBER"
  dateLabelKey="ERP.DATE"
  partyLabelKey="INVOICES.CUSTOMER"
  priceField="salePrice"
  [showValidUntil]="true"
  [showDiscount]="true"
  [totals]="documentTotals()"
  (search)="onSearch($event)"
  (create)="openCreate()"
  (closeForm)="closeForm()"
  (save)="save()"
  (approve)="approveCurrent()"
  (tableAction)="onTableAction($event)"
  (linesChanged)="cdr.markForCheck()"
  (clearError)="errorKey = ''"
  (clearSuccess)="successKey = ''"
></app-erp-document-page-shell>
