<section class="erp-page erp-list-page erp-estate-fade-up">
  <app-page-header [titleKey]="titleKey">
    <div header-actions class="erp-toolbar-icons">
      <button class="erp-button erp-button--primary" type="button" (click)="openCreate()">
        <mat-icon aria-hidden="true">add</mat-icon>
        <span>{{ 'BANKS.CREATE' | translate }}</span>
      </button>
    </div>
  </app-page-header>
  <div class="erp-card erp-list-page__card">
    <div class="erp-card__body">
      <app-erp-alert *ngIf="errorKey" type="danger" [message]="errorKey" extraClass="mb-3" (dismissed)="errorKey = ''"></app-erp-alert>
      <app-erp-alert *ngIf="successKey" type="success" [message]="successKey" extraClass="mb-3" (dismissed)="successKey = ''"></app-erp-alert>
      <app-advanced-search-bar [showStatus]="showStatus" [showDateRange]="false" [statusOptions]="statusOptions" statusLabelPrefix="COMMON.BOOL." (search)="onSearch($event)"></app-advanced-search-bar>
      <app-data-table [columns]="columns" [data]="rows" [actions]="actions" [loading]="loading" (actionClick)="onTableAction($event)"></app-data-table>
    </div>
  </div>
</section>
<app-erp-dialog [visible]="formVisible" [titleKey]="formMode === 'create' ? 'BANKS.CREATE' : (formMode === 'view' ? 'COMMON.VIEW' : 'COMMON.EDIT')" size="lg" (close)="closeForm()">
  <div dialog-body>
    <form [formGroup]="form" class="erp-dialog-form">
      <div class="row">
        <div class="col-md-6 mb-3"><app-form-field [control]="form.controls.bankName" labelKey="BANKS.BANK_NAME" icon="account_balance" [readonly]="readOnly"></app-form-field></div>
        <div class="col-md-6 mb-3"><app-form-field [control]="form.controls.accountNumber" labelKey="BANKS.ACCOUNT_NUMBER" icon="numbers" [readonly]="readOnly"></app-form-field></div>
        <div class="col-md-6 mb-3"><app-form-field [control]="form.controls.iban" labelKey="BANKS.IBAN" icon="credit_card" [readonly]="readOnly"></app-form-field></div>
        <div class="col-md-3 mb-3"><app-form-field [control]="form.controls.currency" labelKey="BANKS.CURRENCY" icon="paid" [readonly]="readOnly"></app-form-field></div>
        <div class="col-md-3 mb-3"><app-form-field [control]="form.controls.openingBalance" labelKey="BANKS.OPENING_BALANCE" icon="account_balance_wallet" type="number" step="0.01" [readonly]="readOnly"></app-form-field></div>
        <div class="col-md-6 mb-3"><app-form-field [control]="form.controls.linkedAccountId" labelKey="BANKS.LINKED_ACCOUNT" icon="savings" type="select" [options]="accountOptions" optionValueField="id" optionLabelField="label" [disabled]="readOnly"></app-form-field></div>
        <div class="col-md-6 mb-3"><app-form-field [control]="form.controls.active" labelKey="COMMON.ACTIVE" icon="toggle_on" type="boolean" [readonly]="readOnly"></app-form-field></div>
      </div>
    </form>
    <app-erp-audit-trail
      *ngIf="formMode !== 'create' && selectedAuditRecord as audit"
      [createdAt]="audit.createdAt"
      [updatedAt]="audit.updatedAt"
      [createdBy]="audit.createdBy"
      [updatedBy]="audit.updatedBy">
    </app-erp-audit-trail>
  </div>
  <div dialog-footer class="d-flex gap-2 justify-content-end">
    <button type="button" class="erp-button erp-button--secondary" (click)="closeForm()">{{ 'COMMON.CLOSE' | translate }}</button>
    <button *ngIf="!readOnly" type="button" class="erp-button erp-button--primary" [disabled]="saving" (click)="save()">{{ 'COMMON.SAVE' | translate }}</button>
  </div>
</app-erp-dialog>
