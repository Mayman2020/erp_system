<section class="erp-page">
  <app-page-header [titleKey]="titleKey"></app-page-header>

  <div class="card erp-unified-card">
    <div class="card-body">
      <app-advanced-search-bar [showStatus]="true" [showDateRange]="false" [statusOptions]="statusOptions" statusLabelPrefix="COMMON.BOOL." (search)="onSearch($event)"></app-advanced-search-bar>
      <div class="alert alert-danger alert-dismissible fade show mt-3" *ngIf="errorKey">
        {{ errorKey | translate }}
        <button type="button" class="btn-close" (click)="errorKey = ''"></button>
      </div>
      <app-data-table [columns]="columns" [data]="rows" [loading]="loading"></app-data-table>
    </div>
  </div>
</section>
