<section class="erp-page accounts-page">
  <app-page-header titleKey="ACCOUNTS.TITLE">
    <div header-actions class="erp-toolbar-icons">
      <button class="erp-button erp-button--ghost" type="button" (click)="toggleTreeView()">
        <mat-icon aria-hidden="true">{{ viewMode === 'table' ? 'account_tree' : 'table_rows' }}</mat-icon>
        <span>{{ (viewMode === 'table' ? 'ACCOUNTS.TREE_VIEW' : 'ACCOUNTS.TABLE_VIEW') | translate }}</span>
      </button>
      <button class="erp-button erp-button--primary" type="button" (click)="openCreateDialog()">
        <mat-icon aria-hidden="true">add</mat-icon>
        <span>{{ 'ACCOUNTS.CREATE' | translate }}</span>
      </button>
    </div>
  </app-page-header>

  <div class="alert alert-success" *ngIf="successKey">{{ successKey | translate }}</div>
  <div class="alert alert-danger" *ngIf="errorKey">{{ errorKey | translate }}</div>

  <section class="accounts-page__controls erp-surface" *ngIf="viewMode === 'table'">
    <app-advanced-search-bar
      class="accounts-page__search"
      [showStatus]="false"
      [showDateRange]="false"
      (search)="onSearch($event)"
    ></app-advanced-search-bar>

    <div class="accounts-page__filters-grid">
      <label class="accounts-page__filter">
        <span class="accounts-page__filter-label">{{ 'ACCOUNTS.TYPE' | translate }}</span>
        <select class="erp-input" [ngModel]="selectedType" (ngModelChange)="onTypeFilterChange($event)">
          <option value="">{{ 'COMMON.ALL' | translate }}</option>
          <option *ngFor="let type of accountTypeOptions" [value]="type.code">{{ ('ACCOUNT_TYPE.' + type.code) | translate }}</option>
        </select>
      </label>

      <label class="accounts-page__filter">
        <span class="accounts-page__filter-label">{{ 'COMMON.STATUS' | translate }}</span>
        <select class="erp-input" [ngModel]="selectedActive" (ngModelChange)="onActiveFilterChange($event)">
          <option value="ALL">{{ 'COMMON.ALL' | translate }}</option>
          <option *ngFor="let status of statusOptions" [value]="status.code">{{ ('STATUS.' + status.code) | translate }}</option>
        </select>
      </label>

      <label class="accounts-page__filter">
        <span class="accounts-page__filter-label">{{ 'ACCOUNTS.FINANCIAL_STATEMENT' | translate }}</span>
        <select class="erp-input" [ngModel]="selectedFinancialStatement" (ngModelChange)="onFinancialStatementFilterChange($event)">
          <option value="">{{ 'COMMON.ALL' | translate }}</option>
          <option value="BALANCE_SHEET">{{ 'FINANCIAL_STATEMENT.BALANCE_SHEET' | translate }}</option>
          <option value="INCOME_STATEMENT">{{ 'FINANCIAL_STATEMENT.INCOME_STATEMENT' | translate }}</option>
        </select>
      </label>

      <label class="accounts-page__filter">
        <span class="accounts-page__filter-label">{{ 'COMMON.SORT_BY' | translate }}</span>
        <select class="erp-input" [ngModel]="sortBy" (ngModelChange)="setSort($event, sortDir)">
          <option value="code">{{ 'ACCOUNTS.CODE' | translate }}</option>
          <option value="name">{{ 'COMMON.NAME' | translate }}</option>
          <option value="accountType">{{ 'ACCOUNTS.TYPE' | translate }}</option>
        </select>
      </label>

      <label class="accounts-page__filter">
        <span class="accounts-page__filter-label">{{ 'COMMON.SORT_DIRECTION' | translate }}</span>
        <select class="erp-input" [ngModel]="sortDir" (ngModelChange)="setSort(sortBy, $event)">
          <option value="asc">{{ 'COMMON.ASC' | translate }}</option>
          <option value="desc">{{ 'COMMON.DESC' | translate }}</option>
        </select>
      </label>
    </div>
  </section>

  <section class="accounts-page__content erp-surface" *ngIf="viewMode === 'table'">
    <div class="accounts-page__section-head">
      <h2>{{ 'ACCOUNTS.TABLE_VIEW' | translate }}</h2>
    </div>
    <app-data-table
      [columns]="columns"
      [data]="pagedRows"
      [actions]="rowActions"
      [pageSize]="5"
      [loading]="loading"
      (actionClick)="onTableAction($event)"
    ></app-data-table>
  </section>

  <section class="accounts-page__content erp-surface" *ngIf="viewMode === 'tree'">
    <div class="accounts-page__section-head">
      <h2>{{ 'ACCOUNTS.TREE_VIEW' | translate }}</h2>
    </div>
    <div class="accounts-tree-page-wrap">
      <app-loading-state *ngIf="loading && !treeRows.length" [compact]="true"></app-loading-state>
      <app-tree-selector *ngIf="treeRows.length" [nodes]="treeRows" [selectedId]="null" [initiallyExpandedDepth]="2"></app-tree-selector>
      <app-empty-state *ngIf="!loading && !treeRows.length" icon="account_tree"></app-empty-state>
    </div>
  </section>
</section>

<app-erp-dialog
  [visible]="dialogVisible"
  [title]="'ACCOUNTS.FORM_TITLE_' + dialogMode.toUpperCase()"
  size="account"
  surfaceClass="accounts-dialog"
  (close)="closeDialog()"
>
  <div dialog-body>
    <div class="alert alert-success" *ngIf="successKey">{{ successKey | translate }}</div>
    <div class="alert alert-danger" *ngIf="errorKey">{{ errorKey | translate }}</div>

    <form [formGroup]="form" class="accounts-dialog__form">
      <div class="accounts-dialog__grid">
        <app-form-field [control]="form.controls.code" labelKey="ACCOUNTS.CODE" icon="tag" [readonly]="true"></app-form-field>

        <app-form-field
          [control]="form.controls.accountType"
          labelKey="ACCOUNTS.TYPE"
          icon="category"
          type="select"
          [options]="accountTypeOptions"
          optionValueField="code"
          optionLabelField="code"
          optionLabelPrefix="ACCOUNT_TYPE."
        ></app-form-field>

        <app-form-field [control]="form.controls.nameAr" labelKey="ACCOUNTS.NAME_AR" icon="translate"></app-form-field>
        <app-form-field [control]="form.controls.nameEn" labelKey="ACCOUNTS.NAME_EN" icon="translate"></app-form-field>

        <div class="accounts-dialog__parent-field accounts-dialog__parent-field--full">
          <app-account-tree-picker
            formControlName="parentId"
            [accountTree]="treeRows"
            labelKey="ACCOUNTS.PARENT"
            icon="account_tree"
            [nullable]="true"
            [minSelectableLevel]="1"
          ></app-account-tree-picker>
        </div>

        <app-form-field
          [control]="form.controls.openingBalance"
          labelKey="ACCOUNTS.OPENING_BALANCE"
          icon="account_balance_wallet"
          type="number"
          step="0.01"
        ></app-form-field>

        <app-form-field
          [control]="form.controls.openingBalanceSide"
          labelKey="ACCOUNTS.OPENING_BALANCE_SIDE"
          icon="swap_vert"
          type="select"
          [options]="['DEBIT', 'CREDIT']"
          [optionLabelPrefix]="'BALANCE_SIDE.'"
        ></app-form-field>

        <app-form-field
          [control]="form.controls.statusCode"
          labelKey="COMMON.STATUS"
          icon="verified"
          type="select"
          [options]="statusOptions"
          optionValueField="code"
          optionLabelField="code"
          optionLabelPrefix="STATUS."
        ></app-form-field>
      </div>
    </form>
  </div>

  <div dialog-footer class="erp-dialog-actions">
    <button class="erp-button erp-button--primary" type="button" [disabled]="actionLoading || dialogMode === 'view'" (click)="saveAccount()">
      {{ 'COMMON.SAVE' | translate }}
    </button>
    <button class="erp-button erp-button--ghost" type="button" (click)="closeDialog()">
      {{ 'COMMON.CANCEL' | translate }}
    </button>
  </div>
</app-erp-dialog>
