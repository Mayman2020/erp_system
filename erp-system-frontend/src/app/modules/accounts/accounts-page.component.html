<section class="erp-page">
  <app-page-header titleKey="ACCOUNTS.TITLE">
    <div header-actions class="erp-toolbar-icons">
        <button
          class="erp-button erp-button--ghost"
          type="button"
          (click)="toggleTreeView()"
        >
          <mat-icon aria-hidden="true">{{ viewMode === 'table' ? 'account_tree' : 'table_rows' }}</mat-icon>
          <span>{{ (viewMode === 'table' ? 'ACCOUNTS.TREE_VIEW' : 'ACCOUNTS.TABLE_VIEW') | translate }}</span>
        </button>
        <button
          class="erp-button erp-button--primary"
          type="button"
          (click)="openCreateDialog()"
        >
          <mat-icon aria-hidden="true">add</mat-icon>
          <span>{{ 'ACCOUNTS.CREATE' | translate }}</span>
        </button>
      </div>
  </app-page-header>

  <div class="alert alert-success" *ngIf="successKey">{{ successKey | translate }}</div>
  <div class="alert alert-danger" *ngIf="errorKey">{{ errorKey | translate }}</div>

  <ng-container *ngIf="viewMode === 'table'">
      <app-advanced-search-bar [showStatus]="false" [showDateRange]="false" (search)="onSearch($event)"></app-advanced-search-bar>

      <div class="card mb-3">
        <div class="card-body row">
          <div class="col-md-4">
            <label class="mb-2">{{ 'ACCOUNTS.TYPE' | translate }}</label>
            <select class="form-control" [ngModel]="selectedType" (ngModelChange)="onTypeFilterChange($event)">
              <option value="">{{ 'COMMON.ALL' | translate }}</option>
              <option *ngFor="let type of accountTypeOptions" [value]="type.code">{{ ('ACCOUNT_TYPE.' + type.code) | translate }}</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="mb-2">{{ 'COMMON.STATUS' | translate }}</label>
            <select class="form-control" [ngModel]="selectedActive" (ngModelChange)="onActiveFilterChange($event)">
              <option value="ALL">{{ 'COMMON.ALL' | translate }}</option>
              <option *ngFor="let status of statusOptions" [value]="status.code">{{ ('STATUS.' + status.code) | translate }}</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="mb-2">{{ 'COMMON.SORT_BY' | translate }}</label>
            <select class="form-control" [ngModel]="sortBy" (ngModelChange)="setSort($event, sortDir)">
              <option value="code">{{ 'ACCOUNTS.CODE' | translate }}</option>
              <option value="name">{{ 'COMMON.NAME' | translate }}</option>
              <option value="accountType">{{ 'ACCOUNTS.TYPE' | translate }}</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="mb-2">{{ 'COMMON.SORT_DIRECTION' | translate }}</label>
            <select class="form-control" [ngModel]="sortDir" (ngModelChange)="setSort(sortBy, $event)">
              <option value="asc">{{ 'COMMON.ASC' | translate }}</option>
              <option value="desc">{{ 'COMMON.DESC' | translate }}</option>
            </select>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-12">
          <div class="card">
            <div class="card-header"><h6 class="mb-0">{{ 'ACCOUNTS.TABLE_VIEW' | translate }}</h6></div>
            <div class="card-body p-0">
              <app-data-table
                [columns]="columns"
                [data]="pagedRows"
                [actions]="rowActions"
                [pageSize]="5"
                [loading]="loading"
                (actionClick)="onTableAction($event)"
              ></app-data-table>
            </div>
          </div>
        </div>
      </div>
  </ng-container>

  <div class="card" *ngIf="viewMode === 'tree'">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h6 class="mb-0">{{ 'ACCOUNTS.TREE_VIEW' | translate }}</h6>
      </div>
      <div class="card-body accounts-tree-page-wrap">
        <app-loading-state *ngIf="loading && !treeRows.length" [compact]="true"></app-loading-state>
        <app-tree-selector *ngIf="treeRows.length" [nodes]="treeRows" [selectedId]="null"></app-tree-selector>
        <app-empty-state *ngIf="!loading && !treeRows.length" icon="account_tree"></app-empty-state>
      </div>
  </div>
</section>

<app-erp-dialog [visible]="dialogVisible" [title]="'ACCOUNTS.FORM_TITLE_' + dialogMode.toUpperCase()" size="xl" (close)="closeDialog()">
  <div dialog-body>
    <form [formGroup]="form" class="row accounts-dialog-form">
      <div class="col-md-6 form-group">
        <app-form-field [control]="form.controls.code" labelKey="ACCOUNTS.CODE" icon="tag"></app-form-field>
      </div>
      <div class="col-md-6 form-group">
        <app-form-field [control]="form.controls.accountType" labelKey="ACCOUNTS.TYPE" icon="category" type="select" [options]="accountTypeOptions" optionValueField="code" optionLabelField="code" optionLabelPrefix="ACCOUNT_TYPE."></app-form-field>
      </div>
      <div class="col-md-6 form-group">
        <app-form-field [control]="form.controls.nameEn" labelKey="ACCOUNTS.NAME_EN" icon="translate"></app-form-field>
      </div>
      <div class="col-md-6 form-group">
        <app-form-field [control]="form.controls.nameAr" labelKey="ACCOUNTS.NAME_AR" icon="translate"></app-form-field>
      </div>
      <div class="col-md-6 form-group accounts-dialog-tree-wrap">
        <label class="mb-2 d-block">{{ 'ACCOUNTS.PARENT' | translate }}</label>
        <input class="form-control mb-3" [value]="selectedParentLabel" readonly />
        <div class="accounts-dialog-tree">
          <app-tree-selector [nodes]="treeRows" [selectedId]="form.value.parentId" (selected)="selectParent($event)"></app-tree-selector>
        </div>
      </div>
      <div class="col-md-6 form-group">
        <app-form-field [control]="form.controls.openingBalance" labelKey="ACCOUNTS.OPENING_BALANCE" icon="account_balance_wallet" type="number" step="0.01"></app-form-field>
        <div class="mt-3">
          <app-form-field [control]="form.controls.openingBalanceSide" labelKey="ACCOUNTS.OPENING_BALANCE_SIDE" icon="swap_vert" type="select" [options]="['DEBIT', 'CREDIT']" [optionLabelPrefix]="'BALANCE_SIDE.'"></app-form-field>
        </div>
      </div>
      <div class="col-md-6 form-group d-flex align-items-center">
        <div class="form-check mt-4">
          <input class="form-check-input" type="checkbox" formControlName="postable" id="postable" />
          <label class="form-check-label" for="postable">{{ 'ACCOUNTS.POSTABLE' | translate }}</label>
        </div>
      </div>
      <div class="col-md-6 form-group">
        <app-form-field [control]="form.controls.statusCode" labelKey="COMMON.STATUS" icon="verified" type="select" [options]="statusOptions" optionValueField="code" optionLabelField="code" optionLabelPrefix="STATUS."></app-form-field>
      </div>
    </form>
  </div>
  <div dialog-footer class="erp-dialog-actions">
    <button class="erp-button erp-button--ghost" type="button" (click)="closeDialog()">
      {{ 'COMMON.CANCEL' | translate }}
    </button>
    <button class="erp-button erp-button--primary" type="button" [disabled]="actionLoading || dialogMode === 'view'" (click)="saveAccount()">
      {{ 'COMMON.SAVE' | translate }}
    </button>
  </div>
</app-erp-dialog>
