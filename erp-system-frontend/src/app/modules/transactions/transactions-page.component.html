<section class="erp-page erp-list-page erp-estate-fade-up">
  <app-page-header [titleKey]="titleKey">
    <div header-actions class="erp-toolbar-icons">
      <button class="erp-button erp-button--primary" type="button" (click)="openCreate()">
        <mat-icon aria-hidden="true">add</mat-icon>
        <span>{{ 'TRANSACTIONS.CREATE' | translate }}</span>
      </button>
    </div>
  </app-page-header>
  <div class="erp-card erp-list-page__card">
    <div class="erp-card__body">
      <app-erp-alert *ngIf="errorKey" type="danger" [message]="errorKey" extraClass="mb-3" (dismissed)="errorKey = ''"></app-erp-alert>
      <app-erp-alert *ngIf="successKey" type="success" [message]="successKey" extraClass="mb-3" (dismissed)="successKey = ''"></app-erp-alert>
      <app-advanced-search-bar [showDateRange]="showDateRange" [showStatus]="showStatus" [statusOptions]="statusOptions" (search)="onSearch($event)"></app-advanced-search-bar>
      <app-data-table [columns]="columns" [data]="rows" [actions]="tableActions" [loading]="loading" (actionClick)="onTableAction($event)"></app-data-table>
    </div>
  </div>
</section>
<app-erp-dialog [visible]="formVisible" [titleKey]="formMode === 'create' ? 'TRANSACTIONS.CREATE' : (formMode === 'view' ? 'COMMON.VIEW' : 'COMMON.EDIT')" size="lg" (close)="closeForm()">
  <div dialog-body>
    <form [formGroup]="form" class="erp-dialog-form">
      <div class="row">
        <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.transactionDate" labelKey="TRANSACTIONS.DATE" icon="event" type="date" [readonly]="readOnly"></app-form-field></div>
        <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.reference" labelKey="TRANSACTIONS.REFERENCE" icon="tag" [readonly]="readOnly"></app-form-field></div>
        <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.transactionType" labelKey="TRANSACTIONS.TYPE" icon="category" type="select" [options]="transactionTypes" [readonly]="readOnly"></app-form-field></div>
        <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.amount" labelKey="TRANSACTIONS.AMOUNT" icon="attach_money" type="number" step="0.01" min="0.01" [readonly]="readOnly"></app-form-field></div>
        <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.debitAccountId" labelKey="TRANSACTIONS.DEBIT_ACCOUNT" icon="arrow_downward" type="select" [options]="accountOptions" optionValueField="id" optionLabelField="label" [disabled]="readOnly"></app-form-field></div>
        <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.creditAccountId" labelKey="TRANSACTIONS.CREDIT_ACCOUNT" icon="arrow_upward" type="select" [options]="accountOptions" optionValueField="id" optionLabelField="label" [disabled]="readOnly"></app-form-field></div>
        <div class="col-12 mb-3"><app-form-field [control]="form.controls.description" labelKey="INVOICES.DESCRIPTION" icon="notes" type="textarea" [rows]="2" [readonly]="readOnly"></app-form-field></div>
        <div class="col-12 mb-3"><app-form-field [control]="form.controls.relatedDocumentReference" labelKey="CHECKS.LINKED_DOC" icon="link" [readonly]="readOnly"></app-form-field></div>
      </div>
    </form>
    <app-erp-audit-trail
      *ngIf="formMode !== 'create' && editingRecord as rec"
      [createdAt]="rec.createdAt"
      [updatedAt]="rec.updatedAt">
    </app-erp-audit-trail>
  </div>
  <div dialog-footer class="d-flex gap-2 justify-content-end">
    <button type="button" class="erp-button erp-button--secondary" (click)="closeForm()">{{ 'COMMON.CLOSE' | translate }}</button>
    <button *ngIf="!readOnly" type="button" class="erp-button erp-button--primary" [disabled]="saving" (click)="save()">{{ 'COMMON.SAVE' | translate }}</button>
  </div>
</app-erp-dialog>
