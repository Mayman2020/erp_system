<section class="erp-page">
  <app-page-header titleKey="GENERAL_LEDGER.TITLE"></app-page-header>

  <div class="card erp-unified-card">
    <div class="card-body">
      <div class="alert alert-danger alert-dismissible fade show" *ngIf="errorKey">
        {{ errorKey | translate }}
        <button type="button" class="btn-close" (click)="errorKey = ''"></button>
      </div>

      <app-advanced-search-bar
        (search)="onSearch($event)"
        [showStatus]="true"
        [statusOptions]="statusOptions"
      ></app-advanced-search-bar>

      <app-data-table
        [columns]="columns"
        [data]="rows"
        [actions]="actions"
        [loading]="loading"
        (actionClick)="onTableAction($event)"
        (cellClick)="onCellClick($event)"
      ></app-data-table>
    </div>
  </div>
</section>
