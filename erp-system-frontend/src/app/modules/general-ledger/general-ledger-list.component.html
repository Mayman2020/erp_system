<section class="erp-page erp-list-page erp-estate-fade-up">
  <app-page-header titleKey="GENERAL_LEDGER.TITLE"></app-page-header>

  <div class="erp-card erp-list-page__card">
    <div class="erp-card__body">
      <app-erp-alert *ngIf="errorKey" type="danger" [message]="errorKey" (dismissed)="errorKey = ''"></app-erp-alert>

      <app-advanced-search-bar
        (search)="onSearch($event)"
        [showStatus]="true"
        [statusOptions]="statusOptions"
      ></app-advanced-search-bar>

      <app-data-table
        [columns]="columns"
        [data]="(rows$ | async) ?? []"
        [actions]="actions"
        [loading]="loading"
        (actionClick)="onTableAction($event)"
        (cellClick)="onCellClick($event)"
      ></app-data-table>
    </div>
  </div>
</section>
