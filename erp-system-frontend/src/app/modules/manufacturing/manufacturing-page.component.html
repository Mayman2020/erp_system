<section class="erp-page erp-list-page erp-estate-fade-up">
  <app-page-header [titleKey]="titleKey">
    <div header-actions class="erp-toolbar-icons">
      <button class="erp-button erp-button--primary" type="button" (click)="openCreate()">
        <mat-icon aria-hidden="true">add</mat-icon>
        <span>{{ 'MANUFACTURING.CREATE' | translate }}</span>
      </button>
    </div>
  </app-page-header>

  <div class="erp-card erp-list-page__card">
    <div class="erp-card__body">
      <app-erp-alert *ngIf="errorKey && !formVisible" type="danger" [message]="errorKey" (dismissed)="errorKey = ''"></app-erp-alert>
      <app-erp-alert *ngIf="successKey && !formVisible" type="success" [message]="successKey" (dismissed)="successKey = ''"></app-erp-alert>

      <app-data-table
        [columns]="columns"
        [data]="rows"
        [actions]="actions"
        [loading]="loading"
        (actionClick)="onTableAction($event)"
      ></app-data-table>
    </div>
  </div>
</section>

<app-erp-dialog
  [visible]="formVisible"
  [titleKey]="formMode === 'create' ? 'MANUFACTURING.CREATE' : (formMode === 'edit' ? 'MANUFACTURING.EDIT' : 'MANUFACTURING.VIEW')"
  size="lg"
  (close)="closeForm()"
>
  <div dialog-body>
    <form [formGroup]="form" class="erp-dialog-form">
      <div class="row">
        <div class="col-md-6 mb-3">
          <app-form-field [control]="form.controls.orderNumber" labelKey="ERP.NUMBER" icon="tag" [readonly]="readOnly"></app-form-field>
        </div>
        <div class="col-md-6 mb-3">
          <app-form-field
            [control]="form.controls.productId"
            labelKey="ERP.PRODUCT"
            icon="inventory_2"
            type="select"
            [options]="productOptions"
            optionValueField="id"
            optionLabelField="label"
            [disabled]="readOnly"
          ></app-form-field>
        </div>
        <div class="col-md-6 mb-3">
          <app-form-field
            [control]="form.controls.warehouseId"
            labelKey="INVOICES.WAREHOUSE"
            icon="warehouse"
            type="select"
            [options]="warehouseOptions"
            optionValueField="id"
            optionLabelField="label"
            [disabled]="readOnly"
          ></app-form-field>
        </div>
        <div class="col-md-6 mb-3">
          <app-form-field
            [control]="form.controls.quantity"
            labelKey="ERP.QUANTITY"
            icon="pin"
            type="number"
            step="0.0001"
            min="0.0001"
            [readonly]="readOnly"
          ></app-form-field>
        </div>
        <div class="col-md-6 mb-3">
          <app-form-field [control]="form.controls.plannedStart" labelKey="MANUFACTURING.PLANNED_START" icon="event" type="date" [readonly]="readOnly"></app-form-field>
        </div>
        <div class="col-md-6 mb-3">
          <app-form-field [control]="form.controls.plannedEnd" labelKey="MANUFACTURING.PLANNED_END" icon="event_available" type="date" [readonly]="readOnly"></app-form-field>
        </div>
        <div class="col-12 mb-3">
          <app-form-field [control]="form.controls.notes" labelKey="INVOICES.NOTES" icon="notes" type="textarea" [rows]="2" [readonly]="readOnly"></app-form-field>
        </div>
      </div>
    </form>
    <app-erp-audit-trail
      *ngIf="formMode !== 'create' && selectedAuditRecord as audit"
      [createdAt]="$any(audit['createdAt'])"
      [updatedAt]="$any(audit['updatedAt'])">
    </app-erp-audit-trail>
  </div>

  <div dialog-footer class="d-flex gap-2 justify-content-end">
    <button type="button" class="erp-button erp-button--secondary" (click)="closeForm()">{{ 'COMMON.CLOSE' | translate }}</button>
    <button *ngIf="!readOnly" type="button" class="erp-button erp-button--primary" [disabled]="saving" (click)="save()">
      {{ 'COMMON.SAVE' | translate }}
    </button>
  </div>
</app-erp-dialog>
