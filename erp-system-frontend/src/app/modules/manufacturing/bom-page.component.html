<section class="erp-page erp-list-page erp-estate-fade-up">
  <app-page-header [titleKey]="titleKey">
    <div header-actions class="erp-toolbar-icons">
      <button class="erp-button erp-button--primary" type="button" [disabled]="!parentProductId" (click)="openCreate()">
        <mat-icon aria-hidden="true">add</mat-icon>
        <span>{{ 'BOM.ADD_LINE' | translate }}</span>
      </button>
    </div>
  </app-page-header>

  <div class="erp-card erp-list-page__card">
    <div class="erp-card__body">
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">{{ 'BOM.PARENT_PRODUCT' | translate }}</label>
          <select class="form-control" [ngModel]="parentProductId" (ngModelChange)="onParentChange($event)">
            <option [ngValue]="null">—</option>
            <option *ngFor="let p of productOptions.slice(1)" [ngValue]="p.id">{{ p.label }}</option>
          </select>
        </div>
      </div>
      <app-erp-alert *ngIf="errorKey" type="danger" [message]="errorKey" extraClass="mb-3" (dismissed)="errorKey = ''"></app-erp-alert>
      <app-data-table [columns]="columns" [data]="rows" [actions]="actions" [loading]="loading" (actionClick)="onTableAction($event)"></app-data-table>
    </div>
  </div>
</section>

<app-erp-dialog [visible]="formVisible" [titleKey]="formMode === 'create' ? 'BOM.ADD_LINE' : 'COMMON.EDIT'" size="md" (close)="closeForm()">
  <div dialog-body>
    <form [formGroup]="form" class="erp-dialog-form">
      <div class="mb-3">
        <label class="form-label">{{ 'BOM.COMPONENT' | translate }}</label>
        <select class="form-control" formControlName="componentProductId" [disabled]="readOnly">
          <option [ngValue]="null">—</option>
          <option *ngFor="let p of productOptions.slice(1)" [ngValue]="p.id">{{ p.label }}</option>
        </select>
      </div>
      <app-form-field [control]="form.controls.quantityPerUnit" labelKey="BOM.QTY_PER_UNIT" type="number" step="0.0001" min="0.0001" [readonly]="readOnly"></app-form-field>
    </form>
    <app-erp-audit-trail
      *ngIf="formMode !== 'create' && selectedAuditRecord as audit"
      [createdAt]="$any(audit['createdAt'])"
      [updatedAt]="$any(audit['updatedAt'])">
    </app-erp-audit-trail>
  </div>
  <div dialog-footer class="d-flex gap-2 justify-content-end">
    <button type="button" class="erp-button erp-button--secondary" (click)="closeForm()">{{ 'COMMON.CLOSE' | translate }}</button>
    <button *ngIf="!readOnly" type="button" class="erp-button erp-button--primary" [disabled]="saving" (click)="save()">{{ 'COMMON.SAVE' | translate }}</button>
  </div>
</app-erp-dialog>
