<section class="erp-page erp-list-page erp-estate-fade-up">
  <app-page-header [titleKey]="titleKey">
    <div header-actions>
      <button class="erp-button erp-button--primary" type="button" (click)="openCreate()">
        <mat-icon aria-hidden="true">add</mat-icon>
        <span>{{ 'TRANSFERS.CREATE' | translate }}</span>
      </button>
    </div>
  </app-page-header>
  <div class="erp-card erp-list-page__card">
    <div class="erp-card__body">
      <app-advanced-search-bar [showStatus]="true" [statusOptions]="statusOptions" (search)="onSearch($event)"></app-advanced-search-bar>
      <app-erp-alert *ngIf="errorKey && !formVisible" type="danger" [message]="errorKey" extraClass="mt-3" (dismissed)="errorKey = ''"></app-erp-alert>
      <app-data-table [columns]="columns" [data]="rows" [actions]="tableActions" [loading]="loading" (actionClick)="onTableAction($event)"></app-data-table>
    </div>
  </div>
</section>

<app-erp-dialog [visible]="formVisible" [titleKey]="formMode === 'create' ? 'TRANSFERS.CREATE' : (formMode === 'edit' ? 'COMMON.EDIT' : 'COMMON.VIEW')" size="lg" (close)="closeForm()">
  <div dialog-body>
    <form [formGroup]="form" class="erp-dialog-form">
      <div class="row">
        <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.transferDate" labelKey="COMMON.DATE" type="date" [readonly]="readOnly"></app-form-field></div>
        <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.reference" labelKey="TRANSFERS.REFERENCE" [readonly]="readOnly"></app-form-field></div>
        <div class="col-md-4 mb-3"><app-form-field [control]="form.controls.amount" labelKey="ERP.AMOUNT" type="number" step="0.01" min="0.01" [readonly]="readOnly"></app-form-field></div>
        <div class="col-md-6 mb-3">
          <label class="form-label">{{ 'TRANSFERS.SOURCE' | translate }}</label>
          <select class="form-control" formControlName="sourceAccountId" [disabled]="readOnly">
            <option *ngFor="let a of accountOptions" [ngValue]="a.id">{{ a.label }}</option>
          </select>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">{{ 'TRANSFERS.DESTINATION' | translate }}</label>
          <select class="form-control" formControlName="destinationAccountId" [disabled]="readOnly">
            <option *ngFor="let a of accountOptions" [ngValue]="a.id">{{ a.label }}</option>
          </select>
        </div>
        <div class="col-12 mb-3"><app-form-field [control]="form.controls.description" labelKey="COMMON.DESCRIPTION" type="textarea" [rows]="2" [readonly]="readOnly"></app-form-field></div>
      </div>
      <app-journal-link *ngIf="currentJournalEntryId" [journalEntryId]="currentJournalEntryId"></app-journal-link>
    </form>
  </div>
  <div dialog-footer class="d-flex gap-2 justify-content-end">
    <button type="button" class="erp-button erp-button--secondary" (click)="closeForm()">{{ 'COMMON.CLOSE' | translate }}</button>
    <button *ngIf="!readOnly" type="button" class="erp-button erp-button--primary" [disabled]="saving" (click)="save()">{{ 'COMMON.SAVE' | translate }}</button>
  </div>
</app-erp-dialog>
