<section class="erp-force-password">
  <div class="erp-force-password__card erp-card">
    <div class="erp-card__body">
      <h2 class="erp-force-password__title">{{ 'AUTH.FORCE_PASSWORD_CHANGE.TITLE' | translate }}</h2>
      <p class="erp-force-password__hint">{{ 'AUTH.FORCE_PASSWORD_CHANGE.HINT' | translate }}</p>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="mb-3">
          <app-form-field [control]="form.controls.currentPassword" labelKey="PROFILE.CURRENT_PASSWORD" icon="lock" type="password"></app-form-field>
        </div>
        <div class="mb-3">
          <app-form-field [control]="form.controls.newPassword" labelKey="PROFILE.NEW_PASSWORD" icon="lock_outline" type="password"></app-form-field>
        </div>
        <div class="mb-3">
          <app-form-field [control]="form.controls.confirmPassword" labelKey="PROFILE.CONFIRM_PASSWORD" icon="lock_outline" type="password"></app-form-field>
        </div>
        <p class="erp-force-password__mismatch" *ngIf="form.errors?.['passwordMismatch'] && form.controls.confirmPassword.touched">
          {{ 'PROFILE.PASSWORD_MISMATCH' | translate }}
        </p>
        <app-erp-alert *ngIf="errorKey" type="danger" [message]="errorKey" extraClass="mb-3" [dismissible]="false"></app-erp-alert>
        <button type="submit" class="erp-button erp-button--primary erp-button--block" [disabled]="saving || form.invalid">
          <mat-icon>lock_reset</mat-icon>
          <span>{{ 'PROFILE.CHANGE_PASSWORD' | translate }}</span>
        </button>
      </form>
    </div>
  </div>
</section>
