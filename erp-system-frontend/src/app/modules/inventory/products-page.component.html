<section class="erp-page erp-list-page erp-estate-fade-up">
  <app-page-header [titleKey]="titleKey">
    <div header-actions>
      <button class="erp-button erp-button--primary" type="button" (click)="openCreate()">
        <mat-icon aria-hidden="true">add</mat-icon>
        <span>{{ 'ERP.CREATE_PRODUCT' | translate }}</span>
      </button>
    </div>
  </app-page-header>

  <div class="erp-card erp-list-page__card">
    <div class="erp-card__body">
      <app-advanced-search-bar [showDateRange]="false" [showStatus]="false" (search)="onSearch($event)"></app-advanced-search-bar>
      <app-erp-alert *ngIf="errorKey && !formVisible" type="danger" [message]="errorKey" extraClass="mt-3" (dismissed)="errorKey = ''"></app-erp-alert>
      <app-erp-alert *ngIf="successKey && !formVisible" type="success" [message]="successKey" extraClass="mt-3" (dismissed)="successKey = ''"></app-erp-alert>
      <app-data-table [columns]="columns" [data]="rows" [actions]="actions" [loading]="loading" (actionClick)="onTableAction($event)"></app-data-table>
    </div>
  </div>
</section>

<app-erp-dialog
  [visible]="formVisible"
  [titleKey]="formMode === 'create' ? 'ERP.CREATE_PRODUCT' : (formMode === 'edit' ? 'COMMON.EDIT' : 'COMMON.VIEW')"
  size="xl"
  (close)="closeForm()"
>
  <div dialog-body>
    <form [formGroup]="form" class="erp-dialog-form">
      <div class="row">
        <div class="col-md-4 mb-3">
          <app-form-field [control]="form.controls.code" labelKey="ERP.CODE" icon="tag" [readonly]="readOnly"></app-form-field>
        </div>
        <div class="col-md-4 mb-3">
          <app-form-field [control]="form.controls.barcode" labelKey="ERP.BARCODE" icon="qr_code" [readonly]="readOnly"></app-form-field>
        </div>
        <div class="col-md-4 mb-3">
          <app-form-field [control]="form.controls.unitId" labelKey="MENU.UNITS" icon="straighten" type="select" [options]="unitOptions" optionValueField="id" optionLabelField="label" [disabled]="readOnly"></app-form-field>
        </div>
        <div class="col-md-6 mb-3">
          <app-form-field [control]="form.controls.nameEn" labelKey="COMMON.NAME" icon="inventory_2" [readonly]="readOnly"></app-form-field>
        </div>
        <div class="col-md-6 mb-3">
          <app-form-field [control]="form.controls.nameAr" labelKey="ERP.NAME_AR" icon="translate" [readonly]="readOnly"></app-form-field>
        </div>
        <div class="col-md-6 mb-3">
          <app-form-field [control]="form.controls.categoryId" labelKey="MENU.CATEGORIES" icon="category" type="select" [options]="categoryOptions" optionValueField="id" optionLabelField="label" [disabled]="readOnly"></app-form-field>
        </div>
        <div class="col-md-3 mb-3">
          <app-form-field [control]="form.controls.costPrice" labelKey="ERP.COST_PRICE" icon="payments" type="number" step="0.01" min="0" [readonly]="readOnly"></app-form-field>
        </div>
        <div class="col-md-3 mb-3">
          <app-form-field [control]="form.controls.salePrice" labelKey="ERP.SALE_PRICE" icon="sell" type="number" step="0.01" min="0" [readonly]="readOnly"></app-form-field>
        </div>
        <div class="col-md-3 mb-3">
          <app-form-field [control]="form.controls.reorderLevel" labelKey="ERP.REORDER_LEVEL" icon="warning" type="number" step="0.01" min="0" [readonly]="readOnly"></app-form-field>
        </div>
        <div class="col-12 mb-3">
          <app-form-field [control]="form.controls.description" labelKey="INVOICES.NOTES" icon="notes" type="textarea" [rows]="2" [readonly]="readOnly"></app-form-field>
        </div>
      </div>
    </form>
  </div>
  <div dialog-footer class="d-flex gap-2 justify-content-end">
    <button type="button" class="erp-button erp-button--secondary" (click)="closeForm()">{{ 'COMMON.CLOSE' | translate }}</button>
    <button *ngIf="!readOnly" type="button" class="erp-button erp-button--primary" [disabled]="saving" (click)="save()">{{ 'COMMON.SAVE' | translate }}</button>
  </div>
</app-erp-dialog>
