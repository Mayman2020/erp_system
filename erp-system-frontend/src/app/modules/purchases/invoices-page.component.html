<app-erp-document-page-shell
  [titleKey]="config.titleKey"
  [columns]="columns"
  [rows]="rows"
  [actions]="actions"
  [statusOptions]="statusOptions"
  [loading]="loading"
  [saving]="saving"
  [errorKey]="errorKey"
  [successKey]="successKey"
  [formVisible]="formVisible"
  [formMode]="formMode"
  [selectedId]="selectedId"
  [auditRecord]="selectedAuditRecord"
  [form]="form"
  [parties]="parties"
  [products]="products"
  [warehouses]="warehouses"
  numberField="invoiceNumber"
  dateField="invoiceDate"
  partyField="supplierId"
  numberLabelKey="INVOICES.NUMBER"
  dateLabelKey="INVOICES.DATE"
  partyLabelKey="INVOICES.SUPPLIER"
  priceField="costPrice"
  [showWarehouse]="true"
  [showDueDate]="true"
  dueDateField="dueDate"
  [showDiscount]="true"
  [totals]="documentTotals()"
  (search)="onSearch($event)"
  (create)="openCreate()"
  (closeForm)="closeForm()"
  (save)="save()"
  (approve)="approveCurrent()"
  (tableAction)="onTableAction($event)"
  (linesChanged)="cdr.markForCheck()"
  (clearError)="errorKey = ''"
  (clearSuccess)="successKey = ''"
></app-erp-document-page-shell>
