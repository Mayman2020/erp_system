<app-command-palette></app-command-palette>

<div
  class="app-shell erp-app-shell erp-admin-shell erp-integrated-shell"
  [class.sidebar-collapsed]="navCollapsed && !navSidebarHidden"
  [class.erp-admin-shell--sidebar-collapsed]="navCollapsed && !navSidebarHidden"
  [class.erp-admin-shell--sidebar-hidden]="navSidebarHidden"
  [class.mob-open]="navCollapsedMob"
  [class.erp-admin-shell--mobile-open]="navCollapsedMob"
>
  <button
    *ngIf="navCollapsedMob"
    type="button"
    class="erp-admin-shell__backdrop"
    (click)="closeMobileNav()"
    [attr.aria-label]="'COMMON.CLOSE' | translate"
  ></button>

  <app-navigation
    class="erp-estate-sidebar erp-admin-shell__sidebar"
    [sidebarCollapsed]="navCollapsed && !navSidebarHidden"
    (onNavMobCollapse)="navMobClick()"
    (onNavCollapse)="toggleSidebarCollapsed()"
  ></app-navigation>

  <div class="main-area erp-admin-shell__workspace">
    <app-nav-bar
      class="erp-estate-topbar erp-admin-shell__header"
      (onNavCollapse)="toggleSidebarCollapsed()"
      (onNavHeaderMobCollapse)="navMobClick()"
    ></app-nav-bar>

    <main class="main-content erp-admin-shell__main">
      <app-breadcrumb class="erp-breadcrumb-host"></app-breadcrumb>
      <div class="erp-route-shell" [@erpPageTransition]="router.url">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
