<div class="erp-header-actions">
  <app-language-switcher [compact]="true" placement="bottom-right" align="end"></app-language-switcher>

  <button
    type="button"
    class="erp-nav-theme-btn"
    (click)="toggleTheme()"
    [attr.title]="'NAV.TOGGLE_THEME' | translate"
    [attr.aria-label]="'NAV.TOGGLE_THEME' | translate"
  >
    <mat-icon aria-hidden="true">{{ darkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</div>
