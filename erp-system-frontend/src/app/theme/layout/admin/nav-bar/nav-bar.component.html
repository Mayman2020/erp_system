<header class="topbar">
  <div class="topbar-start">
    <button
      type="button"
      class="tb-action-btn topbar-toggle"
      id="mobile-collapse"
      (click)="navCollapse()"
      [ngbTooltip]="'TOPBAR.TOGGLE_MENU' | translate"
      placement="bottom"
      container="body"
      [attr.aria-label]="'TOPBAR.TOGGLE_MENU' | translate"
    >
      <mat-icon aria-hidden="true">menu</mat-icon>
    </button>
  </div>

  <div class="topbar-end">
    <app-nav-right></app-nav-right>
  </div>
</header>
