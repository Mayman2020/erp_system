<div id="nav-ps-flat-able" class="flat-able-scroll erp-nav-scroll" [style.max-width]="'100%'">
  <nav class="sidebar-nav estate-sidebar-nav" aria-label="Main navigation">
    <div *ngIf="menuLoading" class="estate-nav-loading">{{ 'COMMON.LOADING' | translate }}</div>

    <ng-container *ngFor="let item of navigation; trackBy: trackById">
      <ng-container *ngTemplateOutlet="nodeTpl; context: { $implicit: item }"></ng-container>
    </ng-container>
  </nav>
</div>

<ng-template #nodeTpl let-node>
  <ng-container *ngIf="!node.hidden && node.type === 'group'">
    <ng-container *ngIf="isCollapsibleGroup(node); else staticGroup">
      <button
        *ngIf="!menuIconsOnly"
        type="button"
        class="nav-section-toggle"
        (click)="toggleSection(node, $event)"
        [attr.aria-expanded]="isSectionOpen(node)"
      >
        <span class="nav-section-label">{{ node.title | translate }}</span>
        <mat-icon class="nav-section-arrow" aria-hidden="true">{{ isSectionOpen(node) ? 'expand_less' : 'expand_more' }}</mat-icon>
      </button>

      <div class="nav-section-items" [class.is-collapsed]="!menuIconsOnly && !isSectionOpen(node)">
        <ng-container *ngFor="let child of node.children; trackBy: trackById">
          <ng-container *ngTemplateOutlet="nodeTpl; context: { $implicit: child }"></ng-container>
        </ng-container>
      </div>
    </ng-container>

    <ng-template #staticGroup>
      <span class="nav-section-label nav-section-label--static" *ngIf="!menuIconsOnly">{{ node.title | translate }}</span>
      <div class="nav-section-items">
        <ng-container *ngFor="let child of node.children; trackBy: trackById">
          <ng-container *ngTemplateOutlet="nodeTpl; context: { $implicit: child }"></ng-container>
        </ng-container>
      </div>
    </ng-template>
  </ng-container>

  <ng-container *ngIf="!node.hidden && node.type === 'collapse' && node.children?.length">
    <button
      type="button"
      class="nav-item nav-item--collapse"
      [class.active]="isCollapseActive(node)"
      (click)="toggleCollapse(node, $event)"
      [attr.aria-expanded]="isCollapseOpen(node)"
      [attr.title]="menuIconsOnly ? null : (node.title | translate)"
      [attr.aria-label]="node.title | translate"
      [ngbTooltip]="menuIconsOnly ? (node.title | translate) : null"
      placement="end"
      container="body"
      triggers="mouseenter:mouseleave"
      [openDelay]="200"
    >
      <span class="nav-icon" *ngIf="node.icon"><mat-icon aria-hidden="true">{{ node.icon }}</mat-icon></span>
      <span class="nav-label" *ngIf="!menuIconsOnly">{{ node.title | translate }}</span>
      <mat-icon class="nav-collapse-arrow" *ngIf="!menuIconsOnly" aria-hidden="true">{{ isCollapseOpen(node) ? 'expand_less' : 'expand_more' }}</mat-icon>
    </button>

    <div class="nav-subsection" [class.is-collapsed]="!isCollapseOpen(node)">
      <ng-container *ngFor="let child of node.children; trackBy: trackById">
        <ng-container *ngTemplateOutlet="nodeTpl; context: { $implicit: child }"></ng-container>
      </ng-container>
    </div>
  </ng-container>

  <ng-container *ngIf="!node.hidden && node.type === 'item'">
    <a
      *ngIf="node.url && !node.external"
      class="nav-item"
      [routerLink]="node.url"
      routerLinkActive="active"
      [routerLinkActiveOptions]="linkActiveOptions(node)"
      [class.active]="isItemActive(node)"
      (click)="onNavItemClick()"
      [attr.title]="menuIconsOnly ? null : (node.title | translate)"
      [attr.aria-label]="node.title | translate"
      [ngbTooltip]="menuIconsOnly ? (node.title | translate) : null"
      placement="end"
      container="body"
      triggers="mouseenter:mouseleave"
      [openDelay]="200"
    >
      <span class="nav-icon" *ngIf="node.icon"><mat-icon aria-hidden="true">{{ node.icon }}</mat-icon></span>
      <span class="nav-label" *ngIf="!menuIconsOnly">{{ node.title | translate }}</span>
      <span *ngIf="node.badge && !menuIconsOnly" class="nav-badge badge" [ngClass]="node.badge.type">{{ node.badge.title }}</span>
    </a>

    <a
      *ngIf="node.url && node.external"
      class="nav-item"
      [href]="node.url"
      [target]="node.target ? '_blank' : '_self'"
      [attr.title]="menuIconsOnly ? null : (node.title | translate)"
      [attr.aria-label]="node.title | translate"
      [ngbTooltip]="menuIconsOnly ? (node.title | translate) : null"
      placement="end"
      container="body"
      triggers="mouseenter:mouseleave"
      [openDelay]="200"
    >
      <span class="nav-icon" *ngIf="node.icon"><mat-icon aria-hidden="true">{{ node.icon }}</mat-icon></span>
      <span class="nav-label" *ngIf="!menuIconsOnly">{{ node.title | translate }}</span>
      <span *ngIf="node.badge && !menuIconsOnly" class="nav-badge badge" [ngClass]="node.badge.type">{{ node.badge.title }}</span>
    </a>
  </ng-container>
</ng-template>
