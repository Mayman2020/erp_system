<ng-container *ngIf="!item.hidden">
  <ng-container *ngIf="useCollapsibleGroup">
    <li class="nav-item pcoded-hasmenu erp-nav-module-group" [class.pcoded-trigger]="expanded">
      <a href="javascript:" class="nav-link erp-nav-module-group__head" (click)="toggleExpanded($event)"
         [attr.aria-expanded]="expanded" [attr.aria-label]="item.title | translate">
        <span class="pcoded-micon" *ngIf="item.icon"><mat-icon aria-hidden="true">{{ item.icon }}</mat-icon></span>
        <span class="pcoded-mtext">{{ item.title | translate }}</span>
        <span class="erp-nav-module-group__caret"><mat-icon aria-hidden="true">{{ expanded ? 'expand_more' : 'chevron_right' }}</mat-icon></span>
      </a>
      <ul class="pcoded-submenu erp-nav-module-group__children">
        <ng-container *ngFor="let child of item.children">
          <app-nav-group *ngIf="child.type=='group'" [item]="child"></app-nav-group>
          <app-nav-collapse *ngIf="child.type=='collapse'" [item]="child"></app-nav-collapse>
          <app-nav-item *ngIf="child.type=='item'" [item]="child"></app-nav-item>
        </ng-container>
      </ul>
    </li>
  </ng-container>

  <ng-container *ngIf="!useCollapsibleGroup">
    <li class="nav-item pcoded-menu-caption"><label>{{ item.title | translate }}</label></li>
    <ng-container *ngFor="let child of item.children">
      <app-nav-group *ngIf="child.type=='group'" [item]="child"></app-nav-group>
      <app-nav-collapse *ngIf="child.type=='collapse'" [item]="child"></app-nav-collapse>
      <app-nav-item *ngIf="child.type=='item'" [item]="child"></app-nav-item>
    </ng-container>
  </ng-container>
</ng-container>
