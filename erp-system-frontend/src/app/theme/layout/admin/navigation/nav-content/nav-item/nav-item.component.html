<ng-container *ngIf="!item.hidden">
  <li class="erp-nav-item" [ngClass]="item.classes" *ngIf="item.url && !item.external" [routerLinkActive]="['active']" [routerLinkActiveOptions]="{ exact: true }">
    <a class="nav-link erp-nav-link" [target]="item.target ? '_blank' : '_self'" [routerLink]="[item.url]" (click)="closeOtherMenu($event)">
      <ng-container *ngTemplateOutlet="itemIcon"></ng-container>
      <span class="pcoded-mtext" *ngIf="item.icon; else directTitle">{{ item.title | translate }}</span>
      <ng-template #directTitle>
        <span class="pcoded-mtext">{{ item.title | translate }}</span>
      </ng-template>
      <ng-container *ngTemplateOutlet="itemBadge"></ng-container>
    </a>
  </li>
  <li class="erp-nav-item" [ngClass]="item.classes" *ngIf="item.url && item.external">
    <a class="erp-nav-link" [target]="item.target ? '_blank' : '_self'" [href]="item.url">
      <ng-container *ngTemplateOutlet="itemIcon"></ng-container>
      <span class="pcoded-mtext" *ngIf="item.icon; else directTitle">{{ item.title | translate }}</span>
      <ng-template #directTitle>
        <span class="pcoded-mtext">{{ item.title | translate }}</span>
      </ng-template>
      <ng-container *ngTemplateOutlet="itemBadge"></ng-container>
    </a>
  </li>
  <ng-template #itemIcon>
    <span *ngIf="item.icon" class="pcoded-micon"><mat-icon aria-hidden="true">{{ item.icon }}</mat-icon></span>
  </ng-template>
  <ng-template #itemBadge>
    <span *ngIf="item.badge && themeLayout === 'vertical'" class="pcoded-badge badge" [ngClass]="item.badge.type">
      {{item.badge.title}}
    </span>
    <span *ngIf="item.badge && themeLayout === 'horizontal'" class="badge label" [ngClass]="item.badge.type">
      {{item.badge.title}}
    </span>
  </ng-template>
</ng-container>
