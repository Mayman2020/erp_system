<div class="erp-estate-sidebar__inner">
  <div class="sidebar-brand" [class.sidebar-brand--collapsed]="sidebarCollapsed">
    <div class="brand-icon">
      <img
        src="assets/images/brand/coreerp-mark-light.svg"
        [alt]="'APP.BRAND' | translate"
        class="brand-icon__mark"
      />
    </div>
    <div class="brand-text" *ngIf="!sidebarCollapsed">
      <span class="brand-name">{{ 'DASHBOARD.ERP_TITLE' | translate }}</span>
      <span class="brand-tagline">{{ 'NAV.ERP_TAGLINE' | translate }}</span>
    </div>
    <button
      *ngIf="!sidebarCollapsed"
      type="button"
      class="collapse-btn"
      (click)="navCollapse()"
      [attr.aria-label]="'NAV.TOGGLE_MENU' | translate"
      [attr.title]="'NAV.TOGGLE_MENU' | translate"
    >
      <mat-icon>{{ sidebarCollapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
    </button>
  </div>

  <div class="erp-sidebar-chrome erp-sidebar-chrome__nav">
    <app-nav-content [menuIconsOnly]="sidebarCollapsed" (onNavMobCollapse)="navMobCollapse()"></app-nav-content>

    <div class="erp-sidebar-footer" *ngIf="!sidebarCollapsed">
      <div class="erp-sidebar-divider"></div>
      <app-sidebar-calendar></app-sidebar-calendar>
    </div>
  </div>
</div>
