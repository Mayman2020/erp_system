<div class="erp-confirm-dialog">
  <h2 class="erp-confirm-dialog__title" id="erp-confirm-title">{{ data.title }}</h2>
  <p class="erp-confirm-dialog__message" id="erp-confirm-message">{{ data.message }}</p>
  <div class="erp-confirm-dialog__actions">
    <button type="button" class="erp-button erp-button--secondary erp-confirm-dialog__btn" (click)="cancel()">
      {{ data.cancelText }}
    </button>
    <button
      type="button"
      class="erp-button erp-confirm-dialog__btn"
      [class.erp-button--danger]="data.danger"
      [class.erp-button--primary]="!data.danger"
      (click)="confirm()"
    >
      {{ data.confirmText }}
    </button>
  </div>
</div>
