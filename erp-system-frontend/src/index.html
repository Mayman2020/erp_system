<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=0, minimal-ui">
  <meta name="description" content="ELEVON ERP — منظومة متكاملة لإدارة أعمالك بكفاءة وذكاء" />
  <title>ELEVON ERP</title>
  <base href="/">

  <!-- Font @font-face rules: loaded via angular.json styles (src/assets/css/erp-font-faces.css) so the bundler resolves paths on Windows/Linux. -->

  <link rel="icon" type="image/svg+xml" href="assets/images/brand/coreerp-mark-light.svg">
  <link rel="alternate icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons&family=Material+Icons+Outlined" rel="stylesheet">
  <script src="assets/runtime-config.js"></script>
</head>
<body>
  <!-- Before Angular boot: lock viewport on /auth/* to prevent a one-frame page scrollbar -->
  <script>
    (function () {
      var p = location.pathname || '';
      if (/\/auth(\/|$)/.test(p)) {
        document.documentElement.classList.add('erp-auth-html-lock');
        document.body.classList.add('erp-auth-body-lock');
      }
    })();
  </script>
  <app-root></app-root>
  <!-- async: do not block first paint over slow VPN/CDN; login falls back if particlesJS is not ready yet -->
  <script async src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</body>
</html>
